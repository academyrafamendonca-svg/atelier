<script type="text/babel">
const { useState, useEffect, useContext, createContext, useRef } = React;

async function supaInsertProduto(p) {
  const { error } = await supabase.from('produtos').insert({
    id: p.id, nome: p.nome, categoria: p.categoria, unidade: p.unidade,
    estoque_minimo: p.estoque_minimo, estoque_atual: p.estoque_atual, ativo: p.ativo,
  });
  if (error) console.error('Supabase (produtos insert):', error.message);
}
async function supaUpdateEstoque(produtoId, novoValor) {
  const { error } = await supabase.from('produtos').update({ estoque_atual: novoValor }).eq('id', produtoId);
  if (error) console.error('Supabase (produtos update):', error.message);
}
async function supaInsertListaCompra(item) {
  const { error } = await supabase.from('lista_compras').insert({
    id: item.id, produto_id: item.produto_id, quantidade_solicitada: item.quantidade_solicitada,

}

  const inicio = new Date(criadoEm); inicio.setHours(0, 0, 0, 0);
  const hojeD = new Date(); hojeD.setHours(0, 0, 0, 0);
  return Math.max(0, Math.round((hojeD - inicio) / (24 * 3600 * 1000)));
}
function dataPrevistaPorUrgencia(urgencia) {
  const d = new Date(); d.setHours(0, 0, 0, 0);
  if (urgencia === 'emergencia') {
    // hoje
  } else if (urgencia === 'urgente') {
    d.setDate(d.getDate() + 1);

    // não urgente: próximo sábado (dia de compras)
    const diasAteSabado = (6 - d.getDay() + 7) % 7 || 7;

  return d.toISOString().slice(0, 10);
}

const COLABORADORES_DEMO = [

const GESTORA_NOME = COLABORADORES_DEMO.find(c => c.is_admin)?.nome || COLABORADORES_DEMO[0].nome;

/* ============================ DADOS (mock em memória) ============================ */

  const [modelosSemanais, setModelosSemanais] = useState(() => {

const AuthContext = createContext(null);
function useAuth() { return useContext(AuthContext); }

function AuthProvider({ children }) {
  const [profile, setProfile] = useState(COLABORADORES_DEMO[0]);
  return (
    <AuthContext.Provider value={{ profile, entrarComo: setProfile }}>
      {children}
    </AuthContext.Provider>
  );
}

/* ============================ LAYOUT ============================ */
function TrocarPerfil({ entrarComo }) {
  const [alvoId, setAlvoId] = useState(COLABORADORES_DEMO[0].id);
  const [pin, setPin] = useState('');
  const [erro, setErro] = useState('');

  function entrar(e) {
    if (e && e.preventDefault) e.preventDefault();
    const alvo = COLABORADORES_DEMO.find(c => c.id === alvoId);
    if (alvo && pin === alvo.pin) {
      setErro('');
      setPin('');
      entrarComo(alvo);
    } else {
      setErro('PIN incorreto.');
    }
  }

  return (
    <form onSubmit={entrar}>
      <label style={{ color: 'var(--cor-tinta-suave)' }}>Trocar de utilizador</label>
      <select value={alvoId} onChange={e => { setAlvoId(e.target.value); setErro(''); }} style={{ marginTop: 4, marginBottom: 6 }}>
        {COLABORADORES_DEMO.map(c => <option key={c.id} value={c.id}>{c.nome} — {c.funcao}</option>)}
      </select>
      <div style={{ display: 'flex', gap: 6 }}>
        <input
          type="password"
          inputMode="numeric"
          maxLength={4}
          placeholder="PIN"
          value={pin}
          onChange={e => { setPin(e.target.value.replace(/\D/g, '').slice(0, 4)); setErro(''); }}
          style={{ width: 70 }}
        />
        <button className="btn btn-secundario" type="button" onClick={entrar} style={{ padding: '7px 12px', fontSize: 12.5 }}>Entrar</button>
      </div>
      {erro && <p style={{ color: 'var(--cor-alerta)', fontSize: 11.5, marginTop: 4 }}>{erro}</p>}
    </form>
  );
}

function exportarCSV(movimentos, nomeFicheiro) {
  const linhas = [['Data', 'Tipo', 'Categoria', 'Descrição', 'Canal', 'Valor']];
  movimentos.forEach(m => {
    linhas.push([m.data, m.tipo, m.categoria, m.descricao || '', m.canal_pagamento || '', Number(m.valor).toFixed(2)]);
  });
  const csv = linhas.map(l => l.map(v => `"${String(v).replace(/"/g, '""')}"`).join(';')).join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = nomeFicheiro;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function ChartCanvas({ type, data, options, height }) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);

  useEffect(() => {
    if (chartRef.current) chartRef.current.destroy();
    const ctx = canvasRef.current.getContext('2d');
    chartRef.current = new Chart(ctx, {
      type,
      data,
      options: { responsive: true, maintainAspectRatio: false, ...options },
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
    // eslint-disable-next-line
  }, [JSON.stringify(data), JSON.stringify(options), type]);

  return (
    <div className="chart-canvas-wrap" style={{ height: height || 220 }}>
      <canvas ref={canvasRef}></canvas>
    </div>
  );
}

function ListaEspera() {
  const db = useDB();
  const vazio = { cliente: '', servico: '', contacto: '', data_preferida: '', notas: '' };
  const [form, setForm] = useState(vazio);

  function adicionar(e) {
    if (e && e.preventDefault) e.preventDefault();
    if (!form.cliente.trim()) return;
    db.listaEsperaOps.add(form);
    setForm(vazio);
  }

  return (
    <div style={{ marginTop: 24 }}>
      <h3 style={{ marginBottom: 12 }}>Lista de espera</h3>
      <p style={{ fontSize: 13, color: 'var(--cor-tinta-suave)', marginBottom: 14 }}>Clientes que queriam marcar mas não havia vaga — assim que abrir um horário, contacta-as por ordem.</p>

      <div className="card" style={{ marginBottom: 16 }}>
        <form onSubmit={adicionar} style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(140px, 1fr))', gap: 10, alignItems: 'end' }}>
          <div style={{ minWidth: 160 }}><label>Cliente</label><input value={form.cliente} onChange={e => setForm({ ...form, cliente: e.target.value })} placeholder="Nome" /></div>
          <div style={{ minWidth: 150 }}><label>Serviço</label><input value={form.servico} onChange={e => setForm({ ...form, servico: e.target.value })} placeholder="Ex: Manicure Gel" /></div>
          <div><label>Contacto</label><input value={form.contacto} onChange={e => setForm({ ...form, contacto: e.target.value })} placeholder="Telemóvel" /></div>
          <div><label>Data preferida</label><input type="date" value={form.data_preferida} onChange={e => setForm({ ...form, data_preferida: e.target.value })} /></div>
          <div><button className="btn" type="button" onClick={adicionar} style={{ width: '100%', justifyContent: 'center' }}>Adicionar</button></div>
        </form>
      </div>

      <div className="card">
        <table>
          <thead><tr><th>Cliente</th><th>Serviço</th><th>Contacto</th><th>Data preferida</th><th></th></tr></thead>
          <tbody>
            {db.listaEspera.map(le => (
              <tr key={le.id}>
                <td>{le.cliente}</td>
                <td>{le.servico || '—'}</td>
                <td>{le.contacto || '—'}</td>
                <td>{le.data_preferida ? new Date(le.data_preferida + 'T00:00:00').toLocaleDateString('pt-PT') : '—'}</td>
                <td><button className="btn btn-secundario" onClick={() => db.listaEsperaOps.remove(le.id)}>Remover</button></td>
              </tr>
            ))}
          </tbody>
        </table>
        {db.listaEspera.length === 0 && <p className="empty-state">Ninguém em lista de espera.</p>}
      </div>
    </div>
  );
}

const FRASES_DA_SEMANA = [
  'Descansa hoje, brilha a semana toda.',
  'Nova semana, novos detalhes para cuidar.',
  'Cada unha bem feita é um sorriso a mais.',
  'A meio da semana, continua a cuidar bem.',

  'Fecha a semana com o mesmo capricho do início.',
  'Dia de compras, dia de preparar a semana.',
];

function Dashboard() {
  const db = useDB();
  const hojeStr = hoje();
  const mesAtual = hojeStr.slice(0, 7);
  const dMesAnterior = new Date(); dMesAnterior.setMonth(dMesAnterior.getMonth() - 1);
  const mesAnterior = `${dMesAnterior.getFullYear()}-${String(dMesAnterior.getMonth() + 1).padStart(2, '0')}`;

  function totalFecho(f) { return Number(f.dinheiro) + Number(f.cartao) + Number(f.online); }
  const vendasMes = db.fechosCaixa.filter(f => f.data.slice(0, 7) === mesAtual);
  const vendasMesAnterior = db.fechosCaixa.filter(f => f.data.slice(0, 7) === mesAnterior);
  const totalVendasMes = vendasMes.reduce((s, f) => s + totalFecho(f), 0);
  const totalVendasMesAnterior = vendasMesAnterior.reduce((s, f) => s + totalFecho(f), 0);
  const totalVendasHoje = db.fechosCaixa.filter(f => f.data === hojeStr).reduce((s, f) => s + totalFecho(f), 0);
  const tendenciaVendas = totalVendasMesAnterior === 0 ? null : ((totalVendasMes - totalVendasMesAnterior) / totalVendasMesAnterior) * 100;

  const movimentosMes = db.financeiro.filter(m => m.data.slice(0, 7) === mesAtual);
  const entradasMes = movimentosMes.filter(m => m.tipo === 'entrada').reduce((s, m) => s + Number(m.valor), 0);
  const saidasMes = movimentosMes.filter(m => m.tipo === 'saida').reduce((s, m) => s + Number(m.valor), 0);
  const margemMes = entradasMes - saidasMes;

  const dias = [];
  for (let i = 13; i >= 0; i--) { const d = new Date(); d.setDate(d.getDate() - i); dias.push(d.toISOString().slice(0, 10)); }
  const vendasPorDia = dias.map(d => { const f = db.fechosCaixa.find(fc => fc.data === d); return f ? totalFecho(f) : 0; });

  const comprasMes = db.compras.filter(c => c.data_compra.slice(0, 7) === mesAtual);
  const gastoPorProduto = {};
  comprasMes.forEach(c => { gastoPorProduto[c.produto_id] = (gastoPorProduto[c.produto_id] || 0) + c.preco_total; });
  const topProdutos = Object.entries(gastoPorProduto).map(([id, valor]) => ({ nome: db.nomeProduto(id), valor })).sort((a, b) => b.valor - a.valor).slice(0, 5);

  const produtosOkCount = db.produtos.filter(p => p.ativo && p.estoque_atual > p.estoque_minimo).length;
  const produtosBaixoCount = db.produtosEstoqueBaixo.length;

  const contasPagarAbertas = db.contasPagar.filter(c => c.status === 'pendente');
  const totalContasPagar = contasPagarAbertas.reduce((s, c) => s + Number(c.valor), 0);
  const contasVencidas = contasPagarAbertas.filter(c => c.data_vencimento && c.data_vencimento < hojeStr);
  const daqui3Dias = new Date(); daqui3Dias.setDate(daqui3Dias.getDate() + 3);
  const daqui3DiasStr = daqui3Dias.toISOString().slice(0, 10);
  const contasAVencerEmBreve = contasPagarAbertas.filter(c => c.data_vencimento && c.data_vencimento >= hojeStr && c.data_vencimento <= daqui3DiasStr);

  const pendentesVencidos = db.pendentesPagamento.filter(p => p.status === 'pendente' && p.data_prevista && p.data_prevista < hojeStr);
  const estrategiasParaVerificar = db.estrategiasVendas.filter(e => e.data_fim && e.data_fim <= hojeStr && e.status !== 'concluida');
  const pedidosListaCompras = db.listaCompras.filter(l => l.status === 'pendente').sort((a, b) => {
    const ordemUrg = { emergencia: 0, urgente: 1, nao_urgente: 2 };
    return (ordemUrg[a.urgencia] ?? 2) - (ordemUrg[b.urgencia] ?? 2);
  });
  const pedidosEmergencia = pedidosListaCompras.filter(l => l.urgencia === 'emergencia').length;
  const totalPendentesVencidos = pendentesVencidos.reduce((s, p) => s + Number(p.valor), 0);

  const contasReceberAbertas = db.pendentesPagamento.filter(p => p.status === 'pendente');
  const totalContasReceber = contasReceberAbertas.reduce((s, p) => s + Number(p.valor), 0);

  const hojeD = new Date();
  const ultimoDiaMes = new Date(hojeD.getFullYear(), hojeD.getMonth() + 1, 0).getDate();
  const diaAtualMes = hojeD.getDate();
  const diasRestantesMes = Math.max(0, ultimoDiaMes - diaAtualMes);

  const faltaParaMeta = Math.max(0, db.metaMensalVendas - totalVendasMes);
  const progressoMeta = db.metaMensalVendas > 0 ? Math.min(100, (totalVendasMes / db.metaMensalVendas) * 100) : 0;
  const mediaNecessariaPorDia = diasRestantesMes > 0 ? faltaParaMeta / diasRestantesMes : faltaParaMeta;

  const progressoGasto = db.limiteGastosMensal > 0 ? (saidasMes / db.limiteGastosMensal) * 100 : 0;
  const excedeuLimite = saidasMes > db.limiteGastosMensal;
  const faltaParaLimite = Math.max(0, db.limiteGastosMensal - saidasMes);

  const tarefasGestoraAbertas = db.tarefas
    .filter(t => t.responsavel_nome === GESTORA_NOME && t.status !== 'concluido')
    .sort((a, b) => {
      const ordemUrgencia = { alta: 0, media: 1, baixa: 2 };
      return (ordemUrgencia[a.urgencia] ?? 1) - (ordemUrgencia[b.urgencia] ?? 1);
    });

  return (
    <div>
      <div className="topbar">
        <div>
          <p className="eyebrow">{new Date().toLocaleDateString('pt-PT', { weekday: 'long', day: 'numeric', month: 'long' })}</p>
          <h1>{(() => { const h = new Date().getHours(); return h < 12 ? 'Bom dia' : h < 20 ? 'Boa tarde' : 'Boa noite'; })()}, Rafa</h1>
          <p style={{ fontSize: 13.5, color: 'var(--cor-tinta-suave)', fontStyle: 'italic', marginTop: 4 }}>
            {FRASES_DA_SEMANA[new Date().getDay()]}
          </p>
        </div>
      </div>

      <div className="dash-grid-top" style={{ marginBottom: 22 }}>
        <div className="card" style={{ borderColor: 'var(--cor-vinho)' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 6 }}>
            <h3>Meta do mês</h3>
            <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
              <span style={{ fontSize: 12, color: 'var(--cor-tinta-suave)' }}>Meta:</span>
              <input type="number" className="meta-input" value={db.metaMensalVendas} onChange={e => db.setMetaMensalVendas(Number(e.target.value) || 0)} />
              <span style={{ fontSize: 12, color: 'var(--cor-tinta-suave)' }}>€</span>
            </div>
          </div>
          <div className="progresso-barra"><div className="progresso-fill" style={{ width: `${progressoMeta}%`, background: 'var(--cor-vinho)' }}></div></div>
          <p style={{ fontSize: 13 }}><strong>{totalVendasMes.toFixed(2)} €</strong> feitos de {db.metaMensalVendas.toFixed(2)} € ({progressoMeta.toFixed(0)}%)</p>
          {faltaParaMeta > 0 ? (
            <p style={{ fontSize: 13, color: 'var(--cor-vinho)', fontWeight: 600, marginTop: 4 }}>
              Faltam <strong>{faltaParaMeta.toFixed(2)} €</strong> — {diasRestantesMes > 0 ? `${mediaNecessariaPorDia.toFixed(2)} €/dia nos próximos ${diasRestantesMes} dias` : 'último dia do mês'}
            </p>
          ) : (
            <p style={{ fontSize: 13, color: 'var(--cor-sucesso)', fontWeight: 600, marginTop: 4 }}>Meta atingida ✓</p>
          )}
        </div>

        <div className="card" style={{ borderColor: excedeuLimite ? 'var(--cor-alerta)' : 'var(--cor-linha)', background: excedeuLimite ? '#FBEDE7' : '#fff' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 6 }}>
            <h3 style={{ color: excedeuLimite ? 'var(--cor-alerta)' : 'var(--cor-vinho-escuro)' }}>Limite de gastos do mês</h3>
            <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
              <span style={{ fontSize: 12, color: 'var(--cor-tinta-suave)' }}>Limite:</span>
              <input type="number" className="meta-input" value={db.limiteGastosMensal} onChange={e => db.setLimiteGastosMensal(Number(e.target.value) || 0)} />
              <span style={{ fontSize: 12, color: 'var(--cor-tinta-suave)' }}>€</span>
            </div>
          </div>
          <div className="progresso-barra"><div className="progresso-fill" style={{ width: `${Math.min(100, progressoGasto)}%`, background: excedeuLimite ? 'var(--cor-alerta)' : 'var(--cor-dourado)' }}></div></div>
          <p style={{ fontSize: 13 }}><strong>{saidasMes.toFixed(2)} €</strong> gastos de {db.limiteGastosMensal.toFixed(2)} € ({progressoGasto.toFixed(0)}%)</p>
          {excedeuLimite ? (
            <p style={{ fontSize: 13, color: 'var(--cor-alerta)', fontWeight: 700, marginTop: 4 }}>⚠ Já ultrapassaste o limite em {(saidasMes - db.limiteGastosMensal).toFixed(2)} €</p>
          ) : (
            <p style={{ fontSize: 13, color: 'var(--cor-tinta-suave)', marginTop: 4 }}>Ainda tens {faltaParaLimite.toFixed(2)} € de margem este mês</p>
          )}
        </div>
      </div>

      <div className="grid grid-2" style={{ marginBottom: 22 }}>
        <div className="card" style={{ borderColor: 'var(--cor-alerta)' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 6 }}>
            <h3 style={{ color: 'var(--cor-alerta)' }}>Contas a pagar</h3>
            <span style={{ fontFamily: 'var(--fonte-display)', fontSize: 24, fontWeight: 700, color: 'var(--cor-alerta)' }}>{totalContasPagar.toFixed(2)} €</span>
          </div>
          <p style={{ fontSize: 13, color: 'var(--cor-tinta-suave)', marginBottom: contasPagarAbertas.length > 0 ? 10 : 0 }}>{contasPagarAbertas.length} em aberto{contasVencidas.length > 0 ? ` · ${contasVencidas.length} vencida${contasVencidas.length > 1 ? 's' : ''}` : ''}</p>
          {contasPagarAbertas.length > 0 && (
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
              {contasPagarAbertas.slice(0, 4).map(c => {
                const vencida = c.data_vencimento && c.data_vencimento < hojeStr;
                return (
                  <span key={c.id} className={'badge ' + (vencida ? 'badge-baixo' : 'badge-pendente')} style={{ fontSize: 10.5 }}>
                    {c.fornecedor} — {Number(c.valor).toFixed(2)} €
                  </span>
                );
              })}
            </div>
          )}
        </div>
        <div className="card" style={{ borderColor: 'var(--cor-sucesso)' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 6 }}>
            <h3 style={{ color: 'var(--cor-sucesso)' }}>Contas a receber</h3>
            <span style={{ fontFamily: 'var(--fonte-display)', fontSize: 24, fontWeight: 700, color: 'var(--cor-sucesso)' }}>{totalContasReceber.toFixed(2)} €</span>
          </div>
          <p style={{ fontSize: 13, color: 'var(--cor-tinta-suave)' }}>{contasReceberAbertas.length} em aberto{pendentesVencidos.length > 0 ? ` · ${pendentesVencidos.length} vencida${pendentesVencidos.length > 1 ? 's' : ''}` : ''}</p>
        </div>
      </div>

      {(pendentesVencidos.length > 0 || pedidosListaCompras.length > 0 || estrategiasParaVerificar.length > 0 || contasAVencerEmBreve.length > 0) && (
        <div className="card" style={{ marginBottom: 22, padding: 0, overflow: 'hidden' }}>
          <div style={{ padding: '16px 22px 4px' }}><h3>Central de avisos</h3></div>

          {pendentesVencidos.length > 0 && (
            <div style={{ padding: '14px 22px', borderTop: '1px solid var(--cor-linha)' }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
                <span style={{ fontWeight: 700, color: 'var(--cor-alerta)', fontSize: 13.5 }}>⚠ Clientes com pagamento em atraso ({pendentesVencidos.length})</span>
                <span style={{ fontFamily: 'var(--fonte-display)', fontWeight: 700, color: 'var(--cor-alerta)' }}>{totalPendentesVencidos.toFixed(2)} €</span>
              </div>
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
                {pendentesVencidos.map(p => (
                  <span key={p.id} className="badge badge-baixo" style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}>
                    {p.nome} — {Number(p.valor).toFixed(2)} € · devia pagar a {new Date(p.data_prevista + 'T00:00:00').toLocaleDateString('pt-PT')}
                    {p.contacto && (
                      <>
                        <a href={linkWhatsapp(p.contacto)} target="_blank" rel="noopener noreferrer" title="WhatsApp" style={{ textDecoration: 'none' }}>💬</a>
                        <a href={linkTel(p.contacto)} title="Ligar" style={{ textDecoration: 'none' }}>📞</a>
                      </>
                    )}
                  </span>
                ))}
              </div>
            </div>
          )}

          {pedidosListaCompras.length > 0 && (
            <div style={{ padding: '14px 22px', borderTop: '1px solid var(--cor-linha)' }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
                <span style={{ fontWeight: 700, fontSize: 13.5, color: pedidosEmergencia > 0 ? 'var(--cor-alerta)' : '#8A6A28' }}>🛒 Pedidos na Lista de Compras ({pedidosListaCompras.length})</span>
                {pedidosEmergencia > 0 && <span className="badge badge-baixo">{pedidosEmergencia} em emergência</span>}
              </div>
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
                {pedidosListaCompras.slice(0, 8).map(l => {
                  const urg = urgenciaInfo(l.urgencia);
                  const dias = diasEmEspera(l.criado_em);
                  return (
                    <span key={l.id} className="badge" style={{ background: urg.fundo, color: urg.cor }}>
                      {db.nomeProduto(l.produto_id)} — {l.solicitado_por_nome || 'equipa'} · {urg.label} · há {dias === 0 ? 'hoje' : `${dias}d`}
                    </span>
                  );
                })}
              </div>
            </div>
          )}

          {contasAVencerEmBreve.length > 0 && (
            <div style={{ padding: '14px 22px', borderTop: '1px solid var(--cor-linha)' }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
                <span style={{ fontWeight: 700, fontSize: 13.5, color: '#8A6A28' }}>⏰ Contas a vencer nos próximos 3 dias ({contasAVencerEmBreve.length})</span>
                <span style={{ fontFamily: 'var(--fonte-display)', fontWeight: 700, color: '#8A6A28' }}>{contasAVencerEmBreve.reduce((s, c) => s + Number(c.valor), 0).toFixed(2)} €</span>
              </div>
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
                {contasAVencerEmBreve.map(c => (
                  <span key={c.id} className="badge badge-pendente">{c.fornecedor} — {Number(c.valor).toFixed(2)} € · vence a {new Date(c.data_vencimento + 'T00:00:00').toLocaleDateString('pt-PT')}</span>
                ))}
              </div>
            </div>
          )}

          {estrategiasParaVerificar.length > 0 && (
            <div style={{ padding: '14px 22px', borderTop: '1px solid var(--cor-linha)' }}>
              <div style={{ marginBottom: 8 }}>
                <span style={{ fontWeight: 700, fontSize: 13.5, color: '#8A6A28' }}>📋 Campanhas para verificar ({estrategiasParaVerificar.length})</span>
                <p style={{ fontSize: 12.5, color: '#8A6A28', marginTop: 2 }}>Já passou a data de fim — vai a Vendas e regista o resultado.</p>
              </div>
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
                {estrategiasParaVerificar.map(e => (
                  <span key={e.id} className="badge badge-pendente">{e.titulo} — terminou a {new Date(e.data_fim + 'T00:00:00').toLocaleDateString('pt-PT')}</span>
                ))}
              </div>
            </div>
          )}
        </div>
      )}

      <div className="kpi-grid">
        <div className="kpi-card">
          <div className="kpi-top"><div className="kpi-icon">€</div></div>
          <p className="kpi-value">{totalVendasHoje.toFixed(2)} €</p>
          <p className="kpi-label">Vendas hoje</p>
        </div>
        <div className="kpi-card acento-dourado">
          <div className="kpi-top">
            <div className="kpi-icon" style={{ background: '#F3E7D2', color: 'var(--cor-dourado)' }}>Σ</div>
            {tendenciaVendas !== null && (
              <span className={'kpi-trend ' + (tendenciaVendas > 0 ? 'up' : tendenciaVendas < 0 ? 'down' : 'flat')}>
                {tendenciaVendas > 0 ? '▲' : tendenciaVendas < 0 ? '▼' : '—'} {Math.abs(tendenciaVendas).toFixed(0)}%
              </span>
            )}
          </div>
          <p className="kpi-value">{totalVendasMes.toFixed(2)} €</p>
          <p className="kpi-label">Vendas no mês</p>
        </div>
        <div className="kpi-card acento-alerta">
          <div className="kpi-top"><div className="kpi-icon" style={{ background: '#F6E2D8', color: 'var(--cor-alerta)' }}>↓</div></div>
          <p className="kpi-value" style={{ color: 'var(--cor-alerta)' }}>{saidasMes.toFixed(2)} €</p>
          <p className="kpi-label">Saídas no mês</p>
        </div>
        <div className="kpi-card acento-sucesso">
          <div className="kpi-top"><div className="kpi-icon" style={{ background: '#E5EBDF', color: 'var(--cor-sucesso)' }}>Δ</div></div>
          <p className="kpi-value" style={{ color: margemMes >= 0 ? 'var(--cor-sucesso)' : 'var(--cor-alerta)' }}>{margemMes.toFixed(2)} €</p>
          <p className="kpi-label">Margem no mês</p>
        </div>
      </div>

      <div className="dash-grid-top">
        <div className="chart-card">
          <h3>Vendas — últimos 14 dias</h3>
          <p className="chart-sub">Total faturado por dia</p>
          <ChartCanvas
            type="line"
            data={{
              labels: dias.map(d => new Date(d).toLocaleDateString('pt-PT', { day: '2-digit', month: '2-digit' })),
              datasets: [{ data: vendasPorDia, borderColor: '#6B3446', backgroundColor: 'rgba(107,52,70,0.08)', fill: true, tension: 0.35, pointRadius: 3, pointBackgroundColor: '#6B3446' }],
            }}
            options={{ plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { color: '#F0E7E0' } }, x: { grid: { display: false } } } }}
            height={240}
          />
        </div>
        <div className="chart-card">
          <h3>Entradas vs Saídas</h3>
          <p className="chart-sub">Mês atual</p>
          <ChartCanvas
            type="doughnut"
            data={{ labels: ['Entradas', 'Saídas'], datasets: [{ data: [entradasMes, saidasMes], backgroundColor: ['#6E8B5C', '#B4552F'], borderWidth: 0 }] }}
            options={{ plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 11.5 } } } }, cutout: '68%' }}
            height={220}
          />
        </div>
      </div>

      <div className="dash-grid-bottom">
        <div className="chart-card">
          <h3>Tarefas de {GESTORA_NOME}</h3>
          <p className="chart-sub">{tarefasGestoraAbertas.length} em aberto, por urgência</p>
          {tarefasGestoraAbertas.slice(0, 6).map(t => {
            const urg = URGENCIAS.find(u => u.key === t.urgencia) || URGENCIAS[1];
            const cat = CATEGORIAS_GESTAO.find(c => c.key === t.categoria);
            const atrasada = t.data_entrega && t.data_entrega < hojeStr;
            return (
              <div key={t.id} className="mini-list-row">
                <span className="mini-list-nome">
                  {t.titulo}
                  {cat && <span style={{ marginLeft: 6, fontSize: 11, color: 'var(--cor-tinta-suave)' }}>· {cat.label}</span>}
                </span>
                <span className="badge" style={{ background: urg.fundo, color: urg.cor }}>
                  {atrasada ? 'Atrasada' : urg.label}
                </span>
              </div>
            );
          })}
          {tarefasGestoraAbertas.length === 0 && <p className="empty-state">Sem tarefas em aberto ✓</p>}
        </div>
        <div className="chart-card">
          <h3>Top produtos por gasto</h3>
          <p className="chart-sub">Compras de estoque este mês</p>
          {topProdutos.length > 0 ? (
            <ChartCanvas
              type="bar"
              data={{ labels: topProdutos.map(p => p.nome), datasets: [{ data: topProdutos.map(p => p.valor), backgroundColor: '#B8935A', borderRadius: 6, maxBarThickness: 28 }] }}
              options={{ indexAxis: 'y', plugins: { legend: { display: false } }, scales: { x: { beginAtZero: true, grid: { color: '#F0E7E0' } }, y: { grid: { display: false } } } }}
              height={220}
            />
          ) : <p className="empty-state">Sem compras registadas este mês.</p>}
        </div>
        <div className="chart-card">
          <h3>Estado do estoque</h3>
          <p className="chart-sub">{produtosBaixoCount} de {produtosBaixoCount + produtosOkCount} produtos a repor</p>
          <div style={{ display: 'flex', gap: 20, alignItems: 'center' }}>
            <div style={{ width: 140, flexShrink: 0 }}>
              <ChartCanvas
                type="doughnut"
                data={{ labels: ['Ok', 'A repor'], datasets: [{ data: [produtosOkCount, produtosBaixoCount], backgroundColor: ['#6E8B5C', '#B4552F'], borderWidth: 0 }] }}
                options={{ plugins: { legend: { display: false } }, cutout: '68%' }}
                height={140}
              />
            </div>
            <div style={{ flex: 1 }}>
              {db.produtosEstoqueBaixo.slice(0, 4).map(p => (
                <div key={p.id} className="mini-list-row">
                  <span className="mini-list-nome">{p.nome}</span>
                  <span className="mini-list-val" style={{ color: 'var(--cor-alerta)' }}>{p.estoque_atual} {p.unidade}</span>
                </div>
              ))}
              {db.produtosEstoqueBaixo.length === 0 && <p className="empty-state" style={{ padding: '10px 0' }}>Tudo em dia ✓</p>}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ============================ LISTA DE COMPRAS (colaboradoras) ============================ */
const ESTADOS_AFIACAO = [
  { key: 'pedido', label: 'Pedido', cor: '#8A6A28', fundo: '#F3E4C9' },
  { key: 'entregue_amolador', label: 'No amolador', cor: 'var(--cor-vinho)', fundo: '#F3E9E2' },
  { key: 'devolvido', label: 'Devolvido — confirmar', cor: 'var(--cor-sucesso)', fundo: '#E5EBDF' },
  { key: 'confirmado', label: 'Confirmado', cor: 'var(--cor-tinta-suave)', fundo: '#F1ECE8' },
];

function AfiacaoRow({ a, db, mostrarAcoesAdmin }) {
  const { profile } = useAuth();
  const est = ESTADOS_AFIACAO.find(e => e.key === a.status);
  const [data, setData] = useState(hoje());
  const [custo, setCusto] = useState('');
  const [jaPago, setJaPago] = useState('nao');
  const [canal, setCanal] = useState(CANAIS_PAGAMENTO_SAIDA[0]);

  return (
    <tr>
      <td>{a.colaboradora}</td>
      <td>{a.quantidade}</td>
      <td>{new Date(a.data_pedido).toLocaleDateString('pt-PT')}</td>
      <td><span className="badge" style={{ background: est.fundo, color: est.cor }}>{est.label}</span></td>
      <td>
        {mostrarAcoesAdmin && a.status === 'pedido' && (
          <div style={{ display: 'flex', gap: 6, alignItems: 'center', flexWrap: 'wrap' }}>
            <select value={jaPago} onChange={e => setJaPago(e.target.value)} className="select-compacto">
              <option value="nao">Pagar depois</option>
              <option value="sim">Já vou pagar agora</option>
            </select>
            {jaPago === 'sim' && (
              <>
                <input type="number" step="0.01" placeholder="Custo €" value={custo} onChange={e => setCusto(e.target.value)} style={{ width: 80 }} />
                <select value={canal} onChange={e => setCanal(e.target.value)} className="select-compacto">
                  {CANAIS_PAGAMENTO_SAIDA.map(cn => <option key={cn} value={cn}>{cn}</option>)}
                </select>
              </>
            )}
            <button className="btn btn-secundario" onClick={() => db.marcarEntregueAmolador(a.id, jaPago === 'sim', custo, canal, profile?.id)}>Entregar ao amolador</button>
          </div>
        )}
        {mostrarAcoesAdmin && a.status === 'entregue_amolador' && <button className="btn btn-secundario" onClick={() => db.marcarDevolvidoAmolador(a.id)}>Amolador devolveu</button>}
        {a.status === 'devolvido' && (
          <div style={{ display: 'flex', gap: 6, alignItems: 'center', flexWrap: 'wrap' }}>
            <input type="date" value={data} onChange={e => setData(e.target.value)} style={{ width: 130 }} />
            {a.pago ? (
              <span className="badge badge-ok">Já pago — {a.canal_pagamento} ({Number(a.custo).toFixed(2)} €)</span>
            ) : (
              <>
                <input type="number" step="0.01" placeholder="Custo €" value={custo} onChange={e => setCusto(e.target.value)} style={{ width: 80 }} />
                <select value={canal} onChange={e => setCanal(e.target.value)} className="select-compacto">
                  {CANAIS_PAGAMENTO_SAIDA.map(cn => <option key={cn} value={cn}>{cn}</option>)}
                </select>
              </>
            )}
            <button className="btn" onClick={() => db.confirmarRecebimentoAfiacao(a.id, data, custo, profile?.id, canal)}>Confirmar entrega</button>
          </div>
        )}
      </td>
    </tr>
  );
}

function AfiarAlicatesTab({ mostrarAcoesAdmin }) {
  const db = useDB();
  const ativos = db.alicatesAfiar.filter(a => a.status !== 'confirmado').sort((a, b) => a.data_pedido.localeCompare(b.data_pedido));
  const confirmados = db.alicatesAfiar.filter(a => a.status === 'confirmado').slice(0, 10);

  return (
    <div>
      <p style={{ fontSize: 13, color: 'var(--cor-tinta-suave)', marginBottom: 16 }}>Cada colaboradora pode afiar até 5 alicates a cada 3 meses. Acompanha aqui desde o pedido até à devolução.</p>
      <div className="card" style={{ marginBottom: 20 }}>
        <table>
          <thead><tr><th>Colaboradora</th><th>Quantidade</th><th>Pedido em</th><th>Estado</th><th></th></tr></thead>

function diasDesdeUltimaCompra(db, produtoId, dataReferenciaISO) {
  const comprasAnteriores = db.compras.filter(c => c.produto_id === produtoId && c.data_compra <= dataReferenciaISO).sort((a, b) => b.data_compra.localeCompare(a.data_compra));
  if (comprasAnteriores.length === 0) return null;
  const diffMs = new Date(dataReferenciaISO + 'T00:00:00') - new Date(comprasAnteriores[0].data_compra + 'T00:00:00');
  return Math.round(diffMs / (24 * 3600 * 1000));
}

function SaidaEstoqueTab() {
  const db = useDB();
  const [produtoId, setProdutoId] = useState('');
  const [quantidade, setQuantidade] = useState('');
  const [retiradoPorNome, setRetiradoPorNome] = useState('');
  const [paraEquipa, setParaEquipa] = useState(false);
  const [ok, setOk] = useState(false);

  const pedidosAEspera = produtoId ? db.listaCompras.filter(l => l.status === 'pendente' && l.produto_id === produtoId).sort((a, b) => a.criado_em.localeCompare(b.criado_em)) : [];
  const pedidoAResolver = pedidosAEspera[0] || null;
  const todosPendentes = [...db.listaCompras.filter(l => l.status === 'pendente')].sort((a, b) => {
    const ordemUrg = { emergencia: 0, urgente: 1, nao_urgente: 2 };
    return (ordemUrg[a.urgencia] ?? 2) - (ordemUrg[b.urgencia] ?? 2) || a.criado_em.localeCompare(b.criado_em);
  });

  function selecionarProduto(id) {
    setProdutoId(id);
    const pendente = db.listaCompras.filter(l => l.status === 'pendente' && l.produto_id === id).sort((a, b) => a.criado_em.localeCompare(b.criado_em))[0];
    if (pendente && pendente.solicitado_por_nome) setRetiradoPorNome(pendente.solicitado_por_nome);
  }

  function registar(e) {
    if (e && e.preventDefault) e.preventDefault();
    if (!produtoId || !quantidade) return;
    if (!paraEquipa && !retiradoPorNome) return;
    if (pedidoAResolver) {
      db.resolverPedidoNaSaida({ listaCompraId: pedidoAResolver.id, produtoId, quantidade: Number(quantidade), retiradoPorNome: paraEquipa ? 'Equipa toda' : retiradoPorNome });
    } else {
      db.registarSaidaEstoque({ produtoId, quantidade: Number(quantidade), retiradoPorNome, paraEquipa });
    }
    setProdutoId(''); setQuantidade(''); setRetiradoPorNome('');
    setOk(true); setTimeout(() => setOk(false), 2000);
  }

  const produtosOrdenados = [...db.produtos].sort((a, b) => a.nome.localeCompare(b.nome));

  const historico = [...db.saidasEstoque].sort((a, b) => b.criado_em.localeCompare(a.criado_em)).slice(0, 20);

  return (
    <div>
      {todosPendentes.length > 0 && (

const CATEGORIAS_SAIDA = ['Materiais', 'Marketing', 'Operacional', 'Limpeza', 'Ordenados', 'Segurança Social', 'Impostos', 'Extras', 'Mercado', 'Investimentos', 'Manutenção', 'Comissão', 'Dívidas'];
const CANAIS_PAGAMENTO_SAIDA = ['Conta principal', 'Online', 'Dinheiro'];

function mesAtualStr() { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`; }

function formatarData(iso) { return new Date(iso + 'T00:00:00').toLocaleDateString('pt-PT'); }

function inicioFimSemana(dataRef) {
  const d = new Date(dataRef + 'T00:00:00');
  const diaISO = d.getDay() === 0 ? 7 : d.getDay();
  const inicio = new Date(d); inicio.setDate(d.getDate() - (diaISO - 1));
  const fim = new Date(inicio); fim.setDate(inicio.getDate() + 6);
  return [inicio.toISOString().slice(0, 10), fim.toISOString().slice(0, 10)];
}
function inicioFimQuinzena(mes, quinzena) {
  const [ano, mesNum] = mes.split('-').map(Number);
  if (quinzena === 1) return [`${mes}-01`, `${mes}-15`];
  const ultimoDia = new Date(ano, mesNum, 0).getDate();
  return [`${mes}-16`, `${mes}-${String(ultimoDia).padStart(2, '0')}`];
}
function inicioFimMes(mes) {
  const [ano, mesNum] = mes.split('-').map(Number);
  const ultimoDia = new Date(ano, mesNum, 0).getDate();
  return [`${mes}-01`, `${mes}-${String(ultimoDia).padStart(2, '0')}`];
}
function inicioFimTrimestre(ano, trimestre) {
  const mesInicio = (trimestre - 1) * 3 + 1;
  const mesFim = mesInicio + 2;
  const ultimoDia = new Date(ano, mesFim, 0).getDate();
  return [`${ano}-${String(mesInicio).padStart(2, '0')}-01`, `${ano}-${String(mesFim).padStart(2, '0')}-${String(ultimoDia).padStart(2, '0')}`];
}
function inicioFimSemestre(ano, semestre) {
  const mesInicio = semestre === 1 ? 1 : 7;
  const mesFim = semestre === 1 ? 6 : 12;
  const ultimoDia = new Date(ano, mesFim, 0).getDate();
  return [`${ano}-${String(mesInicio).padStart(2, '0')}-01`, `${ano}-${String(mesFim).padStart(2, '0')}-${String(ultimoDia).padStart(2, '0')}`];
}
function inicioFimAno(ano) { return [`${ano}-01-01`, `${ano}-12-31`]; }

function gerarBuckets(inicio, fim) {
  const dIni = new Date(inicio + 'T00:00:00');
  const dFim = new Date(fim + 'T00:00:00');
  const diffDias = Math.round((dFim - dIni) / (24 * 3600 * 1000)) + 1;
  const porDia = diffDias <= 45;
  const buckets = [];
  if (porDia) {
    for (let d = new Date(dIni); d <= dFim; d.setDate(d.getDate() + 1)) {
      buckets.push({ key: d.toISOString().slice(0, 10), label: d.toLocaleDateString('pt-PT', { day: '2-digit', month: '2-digit' }) });
    }
  } else {
    let d = new Date(dIni.getFullYear(), dIni.getMonth(), 1);
    const dFimMes = new Date(dFim.getFullYear(), dFim.getMonth(), 1);
    while (d <= dFimMes) {
      buckets.push({ key: d.toISOString().slice(0, 7), label: d.toLocaleDateString('pt-PT', { month: 'short', year: '2-digit' }) });
      d.setMonth(d.getMonth() + 1);
    }
  }
  return { buckets, porDia };
}

function Financeiro() {
  const { profile } = useAuth();
  const db = useDB();
  const [tab, setTab] = useState('fecho');
  const [mes, setMes] = useState(mesAtualStr());
  const [pesquisa, setPesquisa] = useState('');
  const [filtroTipo, setFiltroTipo] = useState('todos');
  const [mostrarNovoMovimento, setMostrarNovoMovimento] = useState(false);

  const movimentosDoMes = db.financeiro.filter(m => m.data.slice(0, 7) === mes);
  const movimentosFiltrados = movimentosDoMes.filter(m => {
    if (filtroTipo !== 'todos' && m.tipo !== filtroTipo) return false;
    if (!pesquisa.trim()) return true;
    const termo = pesquisa.toLowerCase();
    return (m.descricao || '').toLowerCase().includes(termo) || (m.categoria || '').toLowerCase().includes(termo);
  });

  if (profile?.apenasFechoCaixa) {
    return (
      <div>
        <div className="topbar"><div><p className="eyebrow">Financeiro</p><h1>Fecho de caixa</h1></div></div>
        <FechoCaixa />
      </div>
    );
  }
  const comprasDoMes = db.compras.filter(c => c.data_compra.slice(0, 7) === mes);

  const relatorio = {};
  comprasDoMes.forEach(c => {
    const key = c.produto_id;
    if (!relatorio[key]) relatorio[key] = { produto_id: key, produto: db.nomeProduto(key), categoria: db.produtos.find(p => p.id === key)?.categoria || '', quantidade_total: 0, valor_total: 0 };
    relatorio[key].quantidade_total += c.quantidade;
    relatorio[key].valor_total += c.preco_total;
  });
  const relatorioArr = Object.values(relatorio).sort((a, b) => b.valor_total - a.valor_total);

  const saidasPorCategoriaMes = {};
  movimentosDoMes.filter(m => m.tipo === 'saida').forEach(m => {
    if (!saidasPorCategoriaMes[m.categoria]) saidasPorCategoriaMes[m.categoria] = { categoria: m.categoria, valor_total: 0, n_movimentos: 0 };
    saidasPorCategoriaMes[m.categoria].valor_total += Number(m.valor);
    saidasPorCategoriaMes[m.categoria].n_movimentos += 1;
  });
  const saidasPorCategoriaArr = Object.values(saidasPorCategoriaMes).sort((a, b) => b.valor_total - a.valor_total);

  const totalEntradas = movimentosDoMes.filter(m => m.tipo === 'entrada').reduce((s, m) => s + Number(m.valor), 0);
  const totalSaidas = movimentosDoMes.filter(m => m.tipo === 'saida').reduce((s, m) => s + Number(m.valor), 0);
  const totalEstoqueGasto = relatorioArr.reduce((s, r) => s + r.valor_total, 0);

  return (
    <div>
      <div className="topbar">
        <div><p className="eyebrow">Financeiro</p><h1>Movimentos e relatórios</h1></div>
        <input type="month" value={mes} onChange={e => setMes(e.target.value)} style={{ width: 160 }} />
      </div>
      <div className="grid grid-3" style={{ marginBottom: 24 }}>
        <div className="card"><p className="stat-label">Entradas no mês</p><p className="stat-value">{totalEntradas.toFixed(2)} €</p></div>
        <div className="card"><p className="stat-label">Saídas no mês</p><p className="stat-value" style={{ color: 'var(--cor-alerta)' }}>{totalSaidas.toFixed(2)} €</p></div>
        <div className="card"><p className="stat-label">Gasto em estoque no mês</p><p className="stat-value">{totalEstoqueGasto.toFixed(2)} €</p></div>
      </div>
      <div className="tabs" style={{ flexWrap: 'wrap' }}>
        <button className={'tab' + (tab === 'fecho' ? ' active' : '')} onClick={() => setTab('fecho')}>Fecho de caixa</button>
        <button className={'tab' + (tab === 'fluxo' ? ' active' : '')} onClick={() => setTab('fluxo')}>Fluxo de Caixa</button>
        <button className={'tab' + (tab === 'relatorios' ? ' active' : '')} onClick={() => setTab('relatorios')}>Relatórios</button>
        <button className={'tab' + (tab === 'movimentos' ? ' active' : '')} onClick={() => setTab('movimentos')}>Todos os movimentos</button>
      </div>
      {tab === 'fecho' ? (
        <FechoCaixa />
      ) : tab === 'relatorios' ? (
        <Relatorios periodos={['diario', 'semanal', 'quinzenal', 'mensal', 'trimestral', 'semestral', 'anual']} />
      ) : tab === 'fluxo' ? (
        <FluxoDeCaixa />
      ) : (
        <div>
          <div className="no-print" style={{ display: 'flex', gap: 10, marginBottom: 16, alignItems: 'center', flexWrap: 'wrap' }}>
            <input value={pesquisa} onChange={e => setPesquisa(e.target.value)} placeholder="Pesquisar por descrição ou categoria…" style={{ maxWidth: 280 }} />
            <select value={filtroTipo} onChange={e => setFiltroTipo(e.target.value)} style={{ maxWidth: 160 }}>
              <option value="todos">Todos os tipos</option>
              <option value="entrada">Só entradas</option>
              <option value="saida">Só saídas</option>
            </select>
            <button className="btn btn-secundario" type="button" onClick={() => exportarCSV(movimentosFiltrados, `movimentos-${mes}.csv`)}>⬇ Exportar CSV</button>
            <button className="btn" type="button" onClick={() => setMostrarNovoMovimento(s => !s)} style={{ marginLeft: 'auto' }}>{mostrarNovoMovimento ? 'Fechar' : '+ Novo movimento'}</button>
          </div>
          {mostrarNovoMovimento && <div style={{ marginBottom: 16 }}><NovoMovimento /></div>}
          <div className="card">
            <table>
              <thead><tr><th>Data</th><th>Tipo</th><th>Categoria</th><th>Descrição</th><th>Canal</th><th>Valor</th></tr></thead>
              <tbody>
                {movimentosFiltrados.map(m => (
                  <tr key={m.id}>
                    <td>{new Date(m.data).toLocaleDateString('pt-PT')}</td>
                    <td><span className={'badge ' + (m.tipo === 'entrada' ? 'badge-ok' : 'badge-baixo')}>{m.tipo}</span></td>
                    <td>{m.categoria}</td><td>{m.descricao}</td>
                    <td>{m.canal_pagamento || '—'}</td>
                    <td>{m.tipo === 'saida' ? '-' : '+'}{Number(m.valor).toFixed(2)} €</td>
                  </tr>
                ))}
              </tbody>
            </table>
            {movimentosFiltrados.length === 0 && <p className="empty-state">{pesquisa ? 'Nada encontrado para essa pesquisa.' : 'Sem movimentos este mês.'}</p>}
          </div>
        </div>
      )}
    </div>
  );
}

const GRUPOS_PAGAMENTO = [
  { label: 'Dinheiro', cor: 'var(--cor-sucesso)', fundo: '#E5EBDF' },
  { label: 'Cartão', cor: 'var(--cor-vinho)', fundo: '#F3E9E2' },
  { label: 'Online', cor: 'var(--cor-dourado)', fundo: '#F3E7D2' },
  { label: 'Pendente', cor: 'var(--cor-alerta)', fundo: '#F6E2D8' },
];

function FormSaidaRapida({ db, profile, data }) {
  const [categoria, setCategoria] = useState(CATEGORIAS_SAIDA[0]);
  const [valor, setValor] = useState('');
  const [descricao, setDescricao] = useState('');
  const [canal, setCanal] = useState(CANAIS_PAGAMENTO_SAIDA[0]);
  const [ok, setOk] = useState(false);

  function lancar(e) {
    if (e && e.preventDefault) e.preventDefault();
    if (!valor) return;
    db.lancarMovimentoManual({ tipo: 'saida', categoria, valor: Number(valor), descricao, criadoPor: profile?.id, canalPagamento: canal, data });
    setValor(''); setDescricao('');
    setOk(true); setTimeout(() => setOk(false), 2000);
  }

  return (
    <form onSubmit={lancar} style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(140px, 1fr))', gap: 10, alignItems: 'end' }}>
      <div><label>Categoria</label>
        <select value={categoria} onChange={e => setCategoria(e.target.value)}>
          {CATEGORIAS_SAIDA.map(c => <option key={c} value={c}>{c}</option>)}
        </select>
      </div>
      <div><label>Valor (€)</label><input type="number" step="0.01" value={valor} onChange={e => setValor(e.target.value)} /></div>
      <div><label>Canal</label>
        <select value={canal} onChange={e => setCanal(e.target.value)}>
          {CANAIS_PAGAMENTO_SAIDA.map(c => <option key={c} value={c}>{c}</option>)}
        </select>
      </div>
      <div style={{ minWidth: 160 }}><label>Descrição</label><input value={descricao} onChange={e => setDescricao(e.target.value)} placeholder="Opcional" /></div>
      <div><button className="btn" type="button" onClick={lancar} style={{ width: '100%', justifyContent: 'center' }}>Lançar saída</button></div>
      {ok && <span style={{ color: 'var(--cor-sucesso)', fontSize: 13 }}>Lançada ✓</span>}
    </form>
  );
}

function FechoCaixa() {
  const { profile } = useAuth();
  const db = useDB();
  const [data, setData] = useState(hoje());
  const [dinheiro, setDinheiro] = useState('');
  const [cartao, setCartao] = useState('');
  const [online, setOnline] = useState('');
  const [ok, setOk] = useState(false);

  const fechoExistente = db.fechosCaixa.find(f => f.data === data);

  useEffect(() => {
    setDinheiro(fechoExistente ? String(fechoExistente.dinheiro) : '');
    setCartao(fechoExistente ? String(fechoExistente.cartao) : '');
    setOnline(fechoExistente ? String(fechoExistente.online) : '');
    // eslint-disable-next-line
  }, [data]);

  function lancar(e) {
    e.preventDefault();
    db.lancarFechoCaixa({ data, dinheiro: Number(dinheiro) || 0, cartao: Number(cartao) || 0, online: Number(online) || 0, criadoPor: profile?.id });
    setOk(true); setTimeout(() => setOk(false), 2500);
  }

  const pendentesAbertos = db.pendentesPagamento.filter(p => p.status === 'pendente');
  const totalPendente = pendentesAbertos.reduce((s, p) => s + Number(p.valor), 0);

  const movimentosDia = db.financeiro.filter(m => m.data === data);
  const saidas = movimentosDia.filter(m => m.tipo === 'saida').reduce((s, m) => s + Number(m.valor), 0);
  const saidasDoDia = movimentosDia.filter(m => m.tipo === 'saida');
  const totalDia = (Number(dinheiro) || 0) + (Number(cartao) || 0) + (Number(online) || 0);
  const saldoDia = totalDia - saidas;

  const historico = [...db.fechosCaixa].sort((a, b) => b.data.localeCompare(a.data)).slice(0, 10);
  const valoresCanais = [Number(dinheiro) || 0, Number(cartao) || 0, Number(online) || 0, totalPendente];

  return (
    <div>
      <BotaoImprimir />
      <div className="card no-print" style={{ marginBottom: 22 }}>
        <h3 style={{ marginBottom: 4 }}>Lançar entradas</h3>
        <p style={{ fontSize: 13, color: 'var(--cor-tinta-suave)', marginBottom: 16 }}>Indica o dia e quanto entrou em cada canal. {fechoExistente && 'Já existe um fecho para este dia — vais substituí-lo.'}</p>
        <form onSubmit={lancar}>
          <div className="form-row">
            <label>Dia</label>
            <input type="date" value={data} onChange={e => setData(e.target.value)} style={{ maxWidth: 200 }} />
          </div>
          <div className="form-row" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 10 }}>
            <div><label>Dinheiro (€)</label><input type="number" step="0.01" min="0" value={dinheiro} onChange={e => setDinheiro(e.target.value)} /></div>
            <div><label>Cartão (€)</label><input type="number" step="0.01" min="0" value={cartao} onChange={e => setCartao(e.target.value)} /></div>
            <div><label>Online (€)</label><input type="number" step="0.01" min="0" value={online} onChange={e => setOnline(e.target.value)} /></div>
          </div>
          <button className="btn" type="button" onClick={lancar}>{fechoExistente ? 'Atualizar entradas' : 'Lançar entradas'}</button>
          {ok && <span style={{ marginLeft: 12, color: 'var(--cor-sucesso)', fontSize: 13 }}>Lançado ✓</span>}
        </form>
      </div>

      <div className="card no-print" style={{ marginBottom: 22 }}>
        <h3 style={{ marginBottom: 4 }}>Lançar saída deste dia</h3>
        <p style={{ fontSize: 13, color: 'var(--cor-tinta-suave)', marginBottom: 16 }}>Aproveita o fecho para já lançar as saídas do dia, sem teres de ir a outro separador.</p>
        <FormSaidaRapida db={db} profile={profile} data={data} />
      </div>

      {saidasDoDia.length > 0 && (
        <div className="card" style={{ marginBottom: 22 }}>
          <h3 style={{ marginBottom: 14 }}>Saídas lançadas neste dia</h3>
          <table>
            <thead><tr><th>Categoria</th><th>Descrição</th><th>Canal</th><th>Valor</th></tr></thead>
            <tbody>
              {saidasDoDia.map(m => (
                <tr key={m.id}><td>{m.categoria}</td><td>{m.descricao}</td><td>{m.canal_pagamento || '—'}</td><td style={{ color: 'var(--cor-alerta)' }}>-{Number(m.valor).toFixed(2)} €</td></tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      <div className="chart-card" style={{ marginBottom: 22 }}>
        <h3>Resumo do dia</h3>
        <p className="chart-sub">Entradas vs. saídas</p>
        <ChartCanvas
          type="doughnut"
          data={{ labels: ['Entradas', 'Saídas'], datasets: [{ data: [totalDia, saidas], backgroundColor: ['#6E8B5C', '#B4552F'], borderWidth: 0 }] }}
          options={{ plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 11.5 } } } }, cutout: '68%' }}
          height={200}
        />
      </div>

      <div className="kpi-grid" style={{ gridTemplateColumns: 'repeat(4, 1fr)' }}>
        {GRUPOS_PAGAMENTO.map((g, i) => (
          <div key={g.label} className="kpi-card">
            <div className="kpi-top"><div className="kpi-icon" style={{ background: g.fundo, color: g.cor }}>{g.label[0]}</div></div>
            <p className="kpi-value">{valoresCanais[i].toFixed(2)} €</p>
            <p className="kpi-label">{g.label}{g.label === 'Pendente' ? ` · ${pendentesAbertos.length} em aberto` : ''}</p>
          </div>
        ))}
      </div>

      <div className="grid grid-3">
        <div className="card"><p className="stat-label">Total entrado no dia</p><p className="stat-value">{totalDia.toFixed(2)} €</p></div>
        <div className="card"><p className="stat-label">Saídas do dia</p><p className="stat-value" style={{ color: 'var(--cor-alerta)' }}>{saidas.toFixed(2)} €</p></div>
        <div className="card"><p className="stat-label">Saldo do dia</p><p className="stat-value" style={{ color: saldoDia >= 0 ? 'var(--cor-sucesso)' : 'var(--cor-alerta)' }}>{saldoDia.toFixed(2)} €</p></div>
      </div>
    </div>
  );
}

/* ---------- Relatórios ---------- */
const TIPOS_PERIODO = [
  { key: 'diario', label: 'Diário' },
  { key: 'semanal', label: 'Semanal' },
  { key: 'quinzenal', label: 'Quinzenal' },
  { key: 'mensal', label: 'Mensal' },
  { key: 'trimestral', label: 'Trimestral' },
  { key: 'semestral', label: 'Semestral' },
  { key: 'anual', label: 'Anual' },
];

function Relatorios({ periodos }) {
  const db = useDB();
  const anoAtual = new Date().getFullYear();
  const periodosPermitidos = periodos || ['diario', 'semanal', 'quinzenal', 'mensal', 'trimestral', 'semestral', 'anual'];
  const [tipo, setTipo] = useState(periodosPermitidos[0]);
  const [dataDia, setDataDia] = useState(hoje());
  const [dataSemana, setDataSemana] = useState(hoje());
  const [mesQuinzena, setMesQuinzena] = useState(mesAtualStr());
  const [quinzena, setQuinzena] = useState(1);
  const [mesMensal, setMesMensal] = useState(mesAtualStr());
  const [anoTrimestre, setAnoTrimestre] = useState(anoAtual);
  const [trimestre, setTrimestre] = useState(Math.floor(new Date().getMonth() / 3) + 1);
  const [anoSemestre, setAnoSemestre] = useState(anoAtual);
  const [semestre, setSemestre] = useState(new Date().getMonth() < 6 ? 1 : 2);
  const [anoAnual, setAnoAnual] = useState(anoAtual);

  let inicio, fim, labelPeriodo;
  if (tipo === 'diario') { inicio = fim = dataDia; labelPeriodo = new Date(dataDia + 'T00:00:00').toLocaleDateString('pt-PT', { weekday: 'long', day: '2-digit', month: 'long' }); }
  else if (tipo === 'semanal') { [inicio, fim] = inicioFimSemana(dataSemana); labelPeriodo = `${formatarData(inicio)} — ${formatarData(fim)}`; }
  else if (tipo === 'quinzenal') { [inicio, fim] = inicioFimQuinzena(mesQuinzena, quinzena); labelPeriodo = `${formatarData(inicio)} — ${formatarData(fim)}`; }
  else if (tipo === 'mensal') { [inicio, fim] = inicioFimMes(mesMensal); labelPeriodo = new Date(mesMensal + '-01T00:00:00').toLocaleDateString('pt-PT', { month: 'long', year: 'numeric' }); }
  else if (tipo === 'trimestral') { [inicio, fim] = inicioFimTrimestre(anoTrimestre, trimestre); labelPeriodo = `${trimestre}º trimestre de ${anoTrimestre}`; }
  else if (tipo === 'semestral') { [inicio, fim] = inicioFimSemestre(anoSemestre, semestre); labelPeriodo = `${semestre}º semestre de ${anoSemestre}`; }
  else { [inicio, fim] = inicioFimAno(anoAnual); labelPeriodo = `Ano de ${anoAnual}`; }

  const movimentos = db.financeiro.filter(m => m.data >= inicio && m.data <= fim);
  const entradas = movimentos.filter(m => m.tipo === 'entrada');
  const saidas = movimentos.filter(m => m.tipo === 'saida');
  const totalEntradas = entradas.reduce((s, m) => s + Number(m.valor), 0);
  const totalSaidas = saidas.reduce((s, m) => s + Number(m.valor), 0);
  const saldo = totalEntradas - totalSaidas;

  const entradasPorCategoria = {};
  entradas.filter(m => m.categoria !== 'Vendas').forEach(m => { entradasPorCategoria[m.categoria] = (entradasPorCategoria[m.categoria] || 0) + Number(m.valor); });
  const saidasPorCategoria = {};
  saidas.forEach(m => { saidasPorCategoria[m.categoria] = (saidasPorCategoria[m.categoria] || 0) + Number(m.valor); });

  const { buckets, porDia } = gerarBuckets(inicio, fim);
  const entradasPorBucket = buckets.map(b => entradas.filter(m => (porDia ? m.data : m.data.slice(0, 7)) === b.key).reduce((s, m) => s + Number(m.valor), 0));
  const saidasPorBucket = buckets.map(b => saidas.filter(m => (porDia ? m.data : m.data.slice(0, 7)) === b.key).reduce((s, m) => s + Number(m.valor), 0));

  return (
    <div>
      <BotaoImprimir />
      <div className="card no-print" style={{ marginBottom: 20 }}>
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, marginBottom: 16 }}>
          {TIPOS_PERIODO.filter(t => periodosPermitidos.includes(t.key)).map(t => (
            <button key={t.key} className={'tab' + (tipo === t.key ? ' active' : '')} style={{ borderBottom: 'none', background: tipo === t.key ? 'var(--cor-vinho)' : 'transparent', color: tipo === t.key ? '#fff' : 'var(--cor-tinta-suave)', borderRadius: 20, padding: '7px 16px' }} onClick={() => setTipo(t.key)}>{t.label}</button>
          ))}
        </div>

        {tipo === 'diario' && <div style={{ maxWidth: 200 }}><label>Dia</label><input type="date" value={dataDia} onChange={e => setDataDia(e.target.value)} /></div>}
        {tipo === 'semanal' && <div style={{ maxWidth: 200 }}><label>Qualquer dia dessa semana</label><input type="date" value={dataSemana} onChange={e => setDataSemana(e.target.value)} /></div>}
        {tipo === 'quinzenal' && (
          <div style={{ display: 'flex', gap: 10 }}>
            <div style={{ maxWidth: 160 }}><label>Mês</label><input type="month" value={mesQuinzena} onChange={e => setMesQuinzena(e.target.value)} /></div>
            <div style={{ maxWidth: 160 }}><label>Quinzena</label>
              <select value={quinzena} onChange={e => setQuinzena(Number(e.target.value))}>
                <option value={1}>1ª (dia 1-15)</option>
                <option value={2}>2ª (dia 16-fim)</option>
              </select>
            </div>
          </div>
        )}
        {tipo === 'mensal' && <div style={{ maxWidth: 200 }}><label>Mês</label><input type="month" value={mesMensal} onChange={e => setMesMensal(e.target.value)} /></div>}
        {tipo === 'trimestral' && (
          <div style={{ display: 'flex', gap: 10 }}>
            <div style={{ maxWidth: 140 }}><label>Ano</label><input type="number" value={anoTrimestre} onChange={e => setAnoTrimestre(Number(e.target.value))} /></div>
            <div style={{ maxWidth: 160 }}><label>Trimestre</label>
              <select value={trimestre} onChange={e => setTrimestre(Number(e.target.value))}>
                <option value={1}>1º (Jan-Mar)</option><option value={2}>2º (Abr-Jun)</option><option value={3}>3º (Jul-Set)</option><option value={4}>4º (Out-Dez)</option>
              </select>
            </div>
          </div>
        )}
        {tipo === 'semestral' && (
          <div style={{ display: 'flex', gap: 10 }}>
            <div style={{ maxWidth: 140 }}><label>Ano</label><input type="number" value={anoSemestre} onChange={e => setAnoSemestre(Number(e.target.value))} /></div>
            <div style={{ maxWidth: 160 }}><label>Semestre</label>
              <select value={semestre} onChange={e => setSemestre(Number(e.target.value))}>
                <option value={1}>1º (Jan-Jun)</option><option value={2}>2º (Jul-Dez)</option>
              </select>
            </div>
          </div>
        )}
        {tipo === 'anual' && <div style={{ maxWidth: 140 }}><label>Ano</label><input type="number" value={anoAnual} onChange={e => setAnoAnual(Number(e.target.value))} /></div>}
      </div>

      <p style={{ fontSize: 13, color: 'var(--cor-tinta-suave)', marginBottom: 12, textTransform: 'capitalize' }}>{labelPeriodo}</p>

      <div className="grid grid-3" style={{ marginBottom: 22 }}>
        <div className="card"><p className="stat-label">Entradas</p><p className="stat-value">{totalEntradas.toFixed(2)} €</p></div>
        <div className="card"><p className="stat-label">Saídas</p><p className="stat-value" style={{ color: 'var(--cor-alerta)' }}>{totalSaidas.toFixed(2)} €</p></div>
        <div className="card"><p className="stat-label">Saldo</p><p className="stat-value" style={{ color: saldo >= 0 ? 'var(--cor-sucesso)' : 'var(--cor-alerta)' }}>{saldo.toFixed(2)} €</p></div>
      </div>

      {buckets.length > 1 && (
        <div className="chart-card" style={{ marginBottom: 22 }}>
          <h3>Evolução no período</h3>
          <p className="chart-sub">{porDia ? 'Por dia' : 'Por mês'}</p>
          <ChartCanvas
            type="bar"
            data={{
              labels: buckets.map(b => b.label),
              datasets: [
                { label: 'Entradas', data: entradasPorBucket, backgroundColor: '#6E8B5C', borderRadius: 4 },
                { label: 'Saídas', data: saidasPorBucket, backgroundColor: '#B4552F', borderRadius: 4 },
              ],
            }}
            options={{ plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 11.5 } } } }, scales: { x: { grid: { display: false } }, y: { beginAtZero: true, grid: { color: '#F0E7E0' } } } }}
            height={240}
          />
        </div>
      )}

      <div className="grid grid-2">
        <div className="card">
          <h3 style={{ marginBottom: 12 }}>Entradas por categoria</h3>
          <table>
            <thead><tr><th>Categoria</th><th>Valor</th></tr></thead>
            <tbody>
              {Object.entries(entradasPorCategoria).sort((a, b) => b[1] - a[1]).map(([cat, valor]) => <tr key={cat}><td>{cat}</td><td>{valor.toFixed(2)} €</td></tr>)}
            </tbody>
          </table>
          {Object.keys(entradasPorCategoria).length === 0 && <p className="empty-state">Sem entradas neste período.</p>}
        </div>
        <div className="card">
          <h3 style={{ marginBottom: 12 }}>Saídas por categoria</h3>
          <table>
            <thead><tr><th>Categoria</th><th>Valor</th></tr></thead>
            <tbody>
              {Object.entries(saidasPorCategoria).sort((a, b) => b[1] - a[1]).map(([cat, valor]) => <tr key={cat}><td>{cat}</td><td>{valor.toFixed(2)} €</td></tr>)}
            </tbody>
          </table>
          {Object.keys(saidasPorCategoria).length === 0 && <p className="empty-state">Sem saídas neste período.</p>}
        </div>
      </div>
    </div>
  );
}

/* ---------- Saídas ---------- */
function Saidas() {
  const db = useDB();
  const [modo, setModo] = useState('dia');
  const [dia, setDia] = useState(hoje());
  const [mes, setMes] = useState(mesAtualStr());
  const saidasFiltradas = db.financeiro
    .filter(m => m.tipo === 'saida' && (modo === 'dia' ? m.data === dia : m.data.slice(0, 7) === mes))
    .sort((a, b) => b.data.localeCompare(a.data));
  const total = saidasFiltradas.reduce((s, m) => s + Number(m.valor), 0);

  const porCategoria = {};
  saidasFiltradas.forEach(m => { porCategoria[m.categoria] = (porCategoria[m.categoria] || 0) + Number(m.valor); });
  const categorias = Object.entries(porCategoria).sort((a, b) => b[1] - a[1]);

  return (
    <div>
      <BotaoImprimir />
      <div className="topbar">
        <div><p className="stat-label">Total de saídas {modo === 'dia' ? 'do dia' : 'do mês'}</p><p className="stat-value" style={{ color: 'var(--cor-alerta)' }}>{total.toFixed(2)} €</p></div>
        <div className="no-print" style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
          <button className={'tab' + (modo === 'dia' ? ' active' : '')} style={{ borderBottom: 'none', background: modo === 'dia' ? 'var(--cor-vinho)' : 'transparent', color: modo === 'dia' ? '#fff' : 'var(--cor-tinta-suave)', borderRadius: 20, padding: '6px 14px' }} onClick={() => setModo('dia')}>Diário</button>
          <button className={'tab' + (modo === 'mes' ? ' active' : '')} style={{ borderBottom: 'none', background: modo === 'mes' ? 'var(--cor-vinho)' : 'transparent', color: modo === 'mes' ? '#fff' : 'var(--cor-tinta-suave)', borderRadius: 20, padding: '6px 14px' }} onClick={() => setModo('mes')}>Mensal</button>
          {modo === 'dia' ? (
            <input type="date" value={dia} onChange={e => setDia(e.target.value)} style={{ width: 160 }} />
          ) : (
            <input type="month" value={mes} onChange={e => setMes(e.target.value)} style={{ width: 160 }} />
          )}
        </div>
      </div>
      {categorias.length > 0 && (
        <div className="card" style={{ marginBottom: 20 }}>
          <h3 style={{ marginBottom: 12 }}>Por categoria</h3>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 10 }}>
            {categorias.map(([cat, valor]) => (
              <span key={cat} className="badge badge-baixo">{cat}: {valor.toFixed(2)} €</span>
            ))}
          </div>
        </div>
      )}
      <div className="card">
        <table>
          <thead><tr><th>Data</th><th>Categoria</th><th>Descrição</th><th>Canal</th><th>Valor</th></tr></thead>
          <tbody>
            {saidasFiltradas.map(m => (
              <tr key={m.id}>
                <td>{new Date(m.data).toLocaleDateString('pt-PT')}</td>
                <td>{m.categoria}</td>
                <td>{m.descricao}</td>
                <td>{m.canal_pagamento || '—'}</td>
                <td style={{ color: 'var(--cor-alerta)' }}>-{Number(m.valor).toFixed(2)} €</td>
              </tr>
            ))}
          </tbody>
        </table>
        {saidasFiltradas.length === 0 && <p className="empty-state">{modo === 'dia' ? 'Sem saídas neste dia.' : 'Sem saídas neste mês.'}</p>}
      </div>
    </div>
  );
}

function DespesasRecorrentes() {
  const db = useDB();
  const vazio = { fornecedor: '', categoria: CATEGORIAS_SAIDA[0], valor: '', dia_mes: 1, ativo: true };
  const [form, setForm] = useState(vazio);
  const [editandoId, setEditandoId] = useState(null);

  function submeter(e) {
    if (e && e.preventDefault) e.preventDefault();
    if (!form.fornecedor || !form.valor) return;
    const dados = { ...form, valor: Number(form.valor), dia_mes: Number(form.dia_mes) };
    if (editandoId) { db.despesasRecorrentesOps.update(editandoId, dados); setEditandoId(null); }
    else db.despesasRecorrentesOps.add(dados);
    setForm(vazio);
  }

  function editar(d) {
    setEditandoId(d.id);
    setForm({ fornecedor: d.fornecedor, categoria: d.categoria, valor: String(d.valor), dia_mes: d.dia_mes, ativo: d.ativo });
  }

  return (
    <div style={{ marginTop: 16, borderTop: '1px solid var(--cor-linha)', paddingTop: 16 }}>
      <form onSubmit={submeter} style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(130px, 1fr))', gap: 10, alignItems: 'end', marginBottom: 16 }}>
        <div style={{ minWidth: 160 }}><label>A quem</label><input value={form.fornecedor} onChange={e => setForm({ ...form, fornecedor: e.target.value })} placeholder="Ex: Renda" /></div>
        <div><label>Categoria</label>
          <select value={form.categoria} onChange={e => setForm({ ...form, categoria: e.target.value })}>
            {CATEGORIAS_SAIDA.map(c => <option key={c} value={c}>{c}</option>)}
          </select>
        </div>
        <div><label>Valor (€)</label><input type="number" step="0.01" value={form.valor} onChange={e => setForm({ ...form, valor: e.target.value })} /></div>
        <div><label>Dia do mês</label><input type="number" min="1" max="28" value={form.dia_mes} onChange={e => setForm({ ...form, dia_mes: e.target.value })} /></div>
        <div style={{ display: 'flex', gap: 8 }}>
          <button className="btn" type="button" onClick={submeter} style={{ flex: 1, justifyContent: 'center' }}>{editandoId ? 'Guardar' : 'Adicionar'}</button>
          {editandoId && <button className="btn btn-secundario" type="button" onClick={() => { setEditandoId(null); setForm(vazio); }}>Cancelar</button>}
        </div>
      </form>
      <table>
        <thead><tr><th>A quem</th><th>Categoria</th><th>Valor</th><th>Dia</th><th>Ativa</th><th></th></tr></thead>
        <tbody>
          {db.despesasRecorrentes.map(d => (
            <tr key={d.id}>
              <td>{d.fornecedor}</td><td>{d.categoria}</td><td>{Number(d.valor).toFixed(2)} €</td><td>{d.dia_mes}</td>
              <td>
                <select value={d.ativo ? '1' : '0'} onChange={e => db.despesasRecorrentesOps.update(d.id, { ativo: e.target.value === '1' })} style={{ width: 90 }}>
                  <option value="1">Ativa</option><option value="0">Pausada</option>
                </select>
              </td>
              <td style={{ display: 'flex', gap: 6 }}>
                <button className="btn btn-secundario" style={{ padding: '5px 10px' }} onClick={() => editar(d)}>Editar</button>
                <button className="btn btn-secundario" style={{ padding: '5px 10px' }} onClick={() => db.despesasRecorrentesOps.remove(d.id)}>Remover</button>
              </td>
            </tr>
          ))}
        </tbody>
      </table>
      {db.despesasRecorrentes.length === 0 && <p className="empty-state">Sem despesas recorrentes definidas.</p>}
    </div>
  );
}
