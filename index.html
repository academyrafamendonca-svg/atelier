function FluxoDeCaixaVisaoGeral() {
  const db = useDB();
  const saldoAtual = db.financeiro.reduce((s, m) => s + (m.tipo === 'entrada' ? Number(m.valor) : -Number(m.valor)), 0);
  const aReceber = db.pendentesPagamento.filter(p => p.status === 'pendente').reduce((s, p) => s + Number(p.valor), 0);
  const aPagarContas = db.contasPagar.filter(c => c.status === 'pendente').reduce((s, c) => s + Number(c.valor), 0);
  const aPagarComissoes = db.comissoes.filter(c => c.status === 'pendente').reduce((s, c) => s + db.calcularComissao(c.faturacao_bruto), 0);
  const totalAPagar = aPagarContas + aPagarComissoes;
  const saldoProjetado = saldoAtual + aReceber - totalAPagar;

  return (
    <div>
      <p style={{ fontSize: 13, color: 'var(--cor-tinta-suave)', marginBottom: 18 }}>Não é só o que já aconteceu — é para onde o dinheiro vai, juntando o que ainda falta entrar e sair.</p>

      <div className="grid grid-3" style={{ marginBottom: 18 }}>
        <div className="card"><p className="stat-label">Saldo atual</p><p className="stat-value" style={{ color: saldoAtual >= 0 ? 'var(--cor-sucesso)' : 'var(--cor-alerta)' }}>{saldoAtual.toFixed(2)} €</p></div>
        <div className="card"><p className="stat-label">Por receber (pendente)</p><p className="stat-value" style={{ color: 'var(--cor-sucesso)' }}>+{aReceber.toFixed(2)} €</p></div>
        <div className="card"><p className="stat-label">Por pagar (contas + comissões)</p><p className="stat-value" style={{ color: 'var(--cor-alerta)' }}>-{totalAPagar.toFixed(2)} €</p></div>
      </div>

      <div className="card" style={{ marginBottom: 18, textAlign: 'center', padding: 28 }}>
        <p className="stat-label">Saldo projetado depois de tudo isto ser recebido/pago</p>
        <p className="stat-value" style={{ fontSize: 40, color: saldoProjetado >= 0 ? 'var(--cor-sucesso)' : 'var(--cor-alerta)' }}>{saldoProjetado.toFixed(2)} €</p>
        {saldoProjetado < 0 && <p style={{ fontSize: 13, color: 'var(--cor-alerta)', fontWeight: 600, marginTop: 6 }}>⚠ Se tudo isto acontecer, o saldo fica negativo — vale a pena rever prioridades de pagamento.</p>}
      </div>

      <div className="grid grid-2">
        <div className="card">
          <h3 style={{ marginBottom: 12 }}>Por pagar em detalhe</h3>
          <div className="mini-list-row"><span className="mini-list-nome">Contas a pagar</span><span className="mini-list-val">{aPagarContas.toFixed(2)} €</span></div>
          <div className="mini-list-row"><span className="mini-list-nome">Comissões</span><span className="mini-list-val">{aPagarComissoes.toFixed(2)} €</span></div>
        </div>
        <div className="card">
          <h3 style={{ marginBottom: 12 }}>Por receber em detalhe</h3>
          {db.pendentesPagamento.filter(p => p.status === 'pendente').slice(0, 5).map(p => (
            <div key={p.id} className="mini-list-row"><span className="mini-list-nome">{p.nome}</span><span className="mini-list-val">{Number(p.valor).toFixed(2)} €</span></div>
          ))}
          {aReceber === 0 && <p className="empty-state">Nada pendente por receber.</p>}
        </div>
      </div>
    </div>
  );
}

function ContasPagar() {
  const { profile } = useAuth();
  const db = useDB();
  const [fornecedor, setFornecedor] = useState('');
  const [categoria, setCategoria] = useState(CATEGORIAS_SAIDA[0]);
  const [valor, setValor] = useState('');
  const [dataVencimento, setDataVencimento] = useState('');
  const [editandoId, setEditandoId] = useState(null);
  const formRef = useRef(null);
  const [mes, setMes] = useState(mesAtualStr());
  const [verTodos, setVerTodos] = useState(false);
  const [mostrarRecorrentes, setMostrarRecorrentes] = useState(false);

  useEffect(() => {
    db.gerarContasRecorrentesDoMes();
    // eslint-disable-next-line
  }, [db.despesasRecorrentes.length]);

  function adicionar(e) {
    if (e && e.preventDefault) e.preventDefault();
    if (!fornecedor || !valor) return;
    if (editandoId) {
      db.atualizarContaPagar(editandoId, { fornecedor, categoria, valor: Number(valor), data_vencimento: dataVencimento });
      setEditandoId(null);
    } else {
      db.adicionarContaPagar({ fornecedor, categoria, valor: Number(valor), dataVencimento, criadoPor: profile?.id });
    }
    setFornecedor(''); setValor(''); setDataVencimento(''); setCategoria(CATEGORIAS_SAIDA[0]);
  }

  function editar(c) {
    setEditandoId(c.id);
    setFornecedor(c.fornecedor);
    setCategoria(c.categoria || CATEGORIAS_SAIDA[0]);
    setValor(String(c.valor));
    setDataVencimento(c.data_vencimento || '');
    if (formRef.current) formRef.current.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function cancelarEdicao() {
    setEditandoId(null);
    setFornecedor(''); setValor(''); setDataVencimento(''); setCategoria(CATEGORIAS_SAIDA[0]);
  }

  const abertas = db.contasPagar.filter(c => c.status === 'pendente' && (verTodos || (c.data_vencimento || '').slice(0, 7) === mes)).sort((a, b) => (a.data_vencimento || '').localeCompare(b.data_vencimento || ''));
  const pagas = db.contasPagar.filter(c => c.status === 'pago' && (verTodos || (c.data_pagamento || '').slice(0, 7) === mes));
  const totalAberto = abertas.reduce((s, c) => s + Number(c.valor), 0);

  return (
    <div>
      <FiltroMes mes={mes} setMes={setMes} verTodos={verTodos} setVerTodos={setVerTodos} />

      <div className="card no-print" style={{ marginBottom: 20 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <div>
            <h3 style={{ marginBottom: 4 }}>Despesas recorrentes</h3>
            <p style={{ fontSize: 13, color: 'var(--cor-tinta-suave)' }}>Renda, seguros, ordenados — define uma vez e o sistema cria a conta a pagar sozinho todos os meses.</p>
          </div>
          <button className="btn btn-secundario" type="button" onClick={() => setMostrarRecorrentes(s => !s)}>{mostrarRecorrentes ? 'Fechar' : 'Gerir recorrentes'}</button>
        </div>
        {mostrarRecorrentes && <DespesasRecorrentes />}
      </div>

      <div className="card" ref={formRef} style={{ marginBottom: 22, maxWidth: 620 }}>
        <h3 style={{ marginBottom: 4 }}>{editandoId ? 'Editar conta a pagar' : 'Nova conta a pagar'}</h3>
        <p style={{ fontSize: 13, color: 'var(--cor-tinta-suave)', marginBottom: 16 }}>Fornecedores, rendas, ou qualquer coisa que ainda tens de pagar.</p>
        <form onSubmit={adicionar}>
          <div className="form-row" style={{ display: 'grid', gridTemplateColumns: '1.3fr 1fr 1fr', gap: 10 }}>
            <div><label>A quem</label><input value={fornecedor} onChange={e => setFornecedor(e.target.value)} placeholder="Ex: Fornecedor de vernizes" /></div>
            <div><label>Categoria</label>
              <select value={categoria} onChange={e => setCategoria(e.target.value)}>
                {CATEGORIAS_SAIDA.map(c => <option key={c} value={c}>{c}</option>)}
              </select>
            </div>
            <div><label>Valor (€)</label><input type="number" step="0.01" min="0" value={valor} onChange={e => setValor(e.target.value)} /></div>
          </div>
          <div className="form-row">
            <label>Vencimento</label>
            <input type="date" value={dataVencimento} onChange={e => setDataVencimento(e.target.value)} style={{ maxWidth: 200 }} />
          </div>
          <div style={{ display: 'flex', gap: 8 }}>
            <button className="btn btn-secundario" type="button" onClick={adicionar}>{editandoId ? 'Guardar alterações' : 'Adicionar'}</button>
            {editandoId && <button className="btn btn-secundario" type="button" onClick={cancelarEdicao}>Cancelar</button>}
          </div>
        </form>
      </div>

      <div className="card" style={{ marginBottom: 22 }}>
        <p className="stat-label">Total por pagar</p>
        <p className="stat-value" style={{ color: 'var(--cor-alerta)' }}>{totalAberto.toFixed(2)} €</p>
      </div>

      <div className="card">
        <h3 style={{ marginBottom: 14 }}>Em aberto</h3>
        <table>
          <thead><tr><th>A quem</th><th>Categoria</th><th>Valor</th><th>Vencimento</th><th>Estado</th><th>Canal</th><th></th></tr></thead>
          <tbody>
            {abertas.map(c => <ContaPagarRow key={c.id} c={c} db={db} onEditar={editar} />)}
          </tbody>
        </table>
        {abertas.length === 0 && <p className="empty-state">Nada em aberto.</p>}
      </div>

      {pagas.length > 0 && (
        <div className="card" style={{ marginTop: 20 }}>
          <h3 style={{ marginBottom: 14 }}>Já pagas</h3>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, marginBottom: 16 }}>
            {CANAIS_PAGAMENTO_SAIDA.map(canal => {
              const total = pagas.filter(c => c.canal_pagamento === canal).reduce((s, c) => s + Number(c.valor), 0);
              return <span key={canal} className="badge badge-ok">{canal}: {total.toFixed(2)} €</span>;
            })}
          </div>
          <table>
            <thead><tr><th>A quem</th><th>Categoria</th><th>Valor</th><th>Estado</th><th>Canal</th><th></th></tr></thead>
            <tbody>
              {pagas.map(c => (
                <tr key={c.id}>
                  <td>{c.fornecedor}</td><td>{c.categoria || '—'}</td><td>{Number(c.valor).toFixed(2)} €</td>
                  <td><span className="badge badge-ok">Paga</span></td>
                  <td>{c.canal_pagamento || '—'}</td>
                  <td style={{ textAlign: 'right' }}><button className="btn-icon" title="Desfazer pagamento" onClick={() => db.desfazerContaPaga(c.id)}>↺</button></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

/* ---------- Contas a receber ---------- */
function linkWhatsapp(contacto) {
  if (!contacto) return null;
  let digits = contacto.replace(/\D/g, '');
  if (digits.length === 9) digits = '351' + digits;
  return `https://wa.me/${digits}`;
}
function linkTel(contacto) {
  if (!contacto) return null;
  return `tel:${contacto.replace(/\s/g, '')}`;
}

function PendenteRow({ p, db }) {
  const [canal, setCanal] = useState('Dinheiro');
  const vencido = p.data_prevista && p.data_prevista < hoje();
  const wa = linkWhatsapp(p.contacto);
  const tel = linkTel(p.contacto);
  return (
    <tr>
      <td>{p.nome}</td>
      <td>{Number(p.valor).toFixed(2)} €</td>
      <td style={{ color: vencido ? 'var(--cor-alerta)' : 'inherit', fontWeight: vencido ? 700 : 400 }}>
        {p.data_prevista ? new Date(p.data_prevista + 'T00:00:00').toLocaleDateString('pt-PT') : '—'}{vencido ? ' · vencido' : ''}
      </td>
      <td>
        {p.contacto ? (
          <div style={{ display: 'flex', gap: 8 }}>
            <a href={wa} target="_blank" rel="noopener noreferrer" title="WhatsApp" style={{ textDecoration: 'none', fontSize: 18 }}>💬</a>
            <a href={tel} title="Ligar" style={{ textDecoration: 'none', fontSize: 18 }}>📞</a>
          </div>
        ) : '—'}
      </td>
      <td>
        <select value={canal} onChange={e => setCanal(e.target.value)} className="select-compacto">
          <option>Dinheiro</option><option>Cartão</option><option>Online</option>
        </select>
      </td>
      <td style={{ textAlign: 'right' }}><button className="btn" style={{ padding: '7px 12px', fontSize: 12.5 }} onClick={() => db.marcarPendenteComoPago(p.id, canal)}>Marcar pago</button></td>
    </tr>
  );
}

/* ---------- Comissões ---------- */

        <select value={canal} onChange={e => setCanal(e.target.value)} className="select-compacto">

        </select>

      <td style={{ textAlign: 'right' }}><button className="btn" style={{ padding: '7px 12px', fontSize: 12.5 }} onClick={() => db.marcarComissaoPaga(c.id, canal)}>Marcar paga</button></td>

function Comissoes() {
  const { profile } = useAuth();
  const db = useDB();
  const vazio = { profissional: '', mes: mesAtualStr(), faturacaoBruto: '' };
  const [form, setForm] = useState(vazio);
  const [mesFiltro, setMesFiltro] = useState(mesAtualStr());
  const [verTodos, setVerTodos] = useState(false);

  function adicionar(e) {
    if (e && e.preventDefault) e.preventDefault();
    if (!form.profissional.trim() || !form.faturacaoBruto) return;
    db.adicionarComissao({ ...form, faturacaoBruto: Number(form.faturacaoBruto), criadoPor: profile?.id });
    setForm(vazio);
  }

function ContasReceber() {
  const { profile } = useAuth();
  const db = useDB();
  const [nome, setNome] = useState('');
  const [valor, setValor] = useState('');
  const [dataPrevista, setDataPrevista] = useState('');
  const [contacto, setContacto] = useState('');
  const [erro, setErro] = useState('');
  const [ok, setOk] = useState(false);
  const [mes, setMes] = useState(mesAtualStr());
  const [verTodos, setVerTodos] = useState(false);

  function adicionar(e) {
    if (e && e.preventDefault) e.preventDefault();
    if (!nome.trim() || !valor || Number(valor) <= 0) {
      setErro('Preenche o nome e um valor maior que zero.');
      return;
    }
    setErro('');
    db.adicionarPendente({ nome: nome.trim(), valor: Number(valor), dataPrevista, contacto: contacto.trim(), criadoPor: profile?.id });
    setNome(''); setValor(''); setDataPrevista(''); setContacto('');
    setOk(true); setTimeout(() => setOk(false), 2000);
  }

  const abertos = db.pendentesPagamento.filter(p => p.status === 'pendente' && (verTodos || (p.data_prevista || '').slice(0, 7) === mes)).sort((a, b) => (a.data_prevista || '').localeCompare(b.data_prevista || ''));
  const recebidos = db.pendentesPagamento.filter(p => p.status === 'pago' && (verTodos || (p.data_pagamento || '').slice(0, 7) === mes));
  const totalAberto = abertos.reduce((s, p) => s + Number(p.valor), 0);

  return (
    <div>
      <FiltroMes mes={mes} setMes={setMes} verTodos={verTodos} setVerTodos={setVerTodos} />
      <div className="card" style={{ marginBottom: 22, maxWidth: 620 }}>
        <h3 style={{ marginBottom: 4 }}>Nova conta a receber</h3>
        <p style={{ fontSize: 13, color: 'var(--cor-tinta-suave)', marginBottom: 16 }}>Para quando alguém ainda não pagou — quem é, quando vai pagar, e o contacto para cobrar.</p>
        <form onSubmit={adicionar}>
          <div className="form-row" style={{ display: 'grid', gridTemplateColumns: '1.3fr 1fr 1fr', gap: 10 }}>
            <div><label>Nome</label><input value={nome} onChange={e => setNome(e.target.value)} placeholder="Nome da cliente" /></div>
            <div><label>Valor (€)</label><input type="number" step="0.01" min="0" value={valor} onChange={e => setValor(e.target.value)} /></div>
            <div><label>Contacto (telemóvel)</label><input value={contacto} onChange={e => setContacto(e.target.value)} placeholder="912 345 678" /></div>
          </div>
          <div className="form-row">
            <label>Vai pagar em</label>
            <input type="date" value={dataPrevista} onChange={e => setDataPrevista(e.target.value)} style={{ maxWidth: 200 }} />
          </div>
          {erro && <p style={{ color: 'var(--cor-alerta)', fontSize: 13, marginBottom: 10 }}>{erro}</p>}
          <button type="button" className="btn btn-secundario" onClick={adicionar}>Adicionar</button>
          {ok && <span style={{ marginLeft: 12, color: 'var(--cor-sucesso)', fontSize: 13 }}>Adicionado ✓</span>}
        </form>
      </div>

      <div className="card" style={{ marginBottom: 22 }}>
        <p className="stat-label">Total por receber</p>
        <p className="stat-value">{totalAberto.toFixed(2)} €</p>
      </div>

      <div className="card">
        <h3 style={{ marginBottom: 14 }}>Em aberto</h3>
        <table>
          <thead><tr><th>Nome</th><th>Valor</th><th>Vai pagar em</th><th>Contacto</th><th>Canal</th><th></th></tr></thead>
          <tbody>
            {abertos.map(p => <PendenteRow key={p.id} p={p} db={db} />)}
          </tbody>
        </table>
        {abertos.length === 0 && <p className="empty-state">Nada em aberto.</p>}
      </div>

      {recebidos.length > 0 && (
        <div className="card" style={{ marginTop: 20 }}>
          <h3 style={{ marginBottom: 14 }}>Já recebidos</h3>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, marginBottom: 16 }}>
            {['Dinheiro', 'Cartão', 'Online'].map(canal => {
              const total = recebidos.filter(p => p.canal_pagamento === canal).reduce((s, p) => s + Number(p.valor), 0);
              return <span key={canal} className="badge badge-ok">{canal}: {total.toFixed(2)} €</span>;
            })}
          </div>
          <table>
            <thead><tr><th>Nome</th><th>Valor</th><th>Canal</th><th></th></tr></thead>
            <tbody>
              {recebidos.map(p => (
                <tr key={p.id}>
                  <td>{p.nome}</td><td>{Number(p.valor).toFixed(2)} €</td><td>{p.canal_pagamento || '—'}</td>
                  <td style={{ textAlign: 'right' }}><button className="btn-icon" title="Desfazer pagamento" onClick={() => db.desfazerPendentePago(p.id)}>↺</button></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

const TIPOS_PERIODO_VENDAS = [
  { key: 'semanal', label: 'Semanal' },
  { key: 'quinzenal', label: 'Quinzenal' },
  { key: 'mensal', label: 'Mensal' },

function VendasRelatorios() {
  const db = useDB();
  const [tipo, setTipo] = useState('semanal');
  const [dataSemana, setDataSemana] = useState(hoje());
  const [mesQuinzena, setMesQuinzena] = useState(mesAtualStr());
  const [quinzena, setQuinzena] = useState(1);
  const [mesMensal, setMesMensal] = useState(mesAtualStr());

  let inicio, fim, labelPeriodo;
  if (tipo === 'semanal') { [inicio, fim] = inicioFimSemana(dataSemana); labelPeriodo = `${formatarData(inicio)} — ${formatarData(fim)}`; }
  else if (tipo === 'quinzenal') { [inicio, fim] = inicioFimQuinzena(mesQuinzena, quinzena); labelPeriodo = `${formatarData(inicio)} — ${formatarData(fim)}`; }
  else { [inicio, fim] = inicioFimMes(mesMensal); labelPeriodo = new Date(mesMensal + '-01T00:00:00').toLocaleDateString('pt-PT', { month: 'long', year: 'numeric' }); }

  const fechosPeriodo = db.fechosCaixa.filter(f => f.data >= inicio && f.data <= fim);
  const totalDinheiro = fechosPeriodo.reduce((s, f) => s + Number(f.dinheiro), 0);
  const totalCartao = fechosPeriodo.reduce((s, f) => s + Number(f.cartao), 0);
  const totalOnline = fechosPeriodo.reduce((s, f) => s + Number(f.online), 0);
  const totalPeriodo = totalDinheiro + totalCartao + totalOnline;
  const nDias = fechosPeriodo.length;
  const mediaDiaria = nDias > 0 ? totalPeriodo / nDias : 0;

  const { buckets, porDia } = gerarBuckets(inicio, fim);
  const totalPorBucket = buckets.map(b => {
    const fechosBucket = fechosPeriodo.filter(f => (porDia ? f.data : f.data.slice(0, 7)) === b.key);
    return fechosBucket.reduce((s, f) => s + Number(f.dinheiro) + Number(f.cartao) + Number(f.online), 0);
  });

  const totalSemIVA = totalPeriodo / 1.23;
  const valorIVA = totalPeriodo - totalSemIVA;

  return (
    <div>
      <BotaoImprimir />
      <div className="card no-print" style={{ marginBottom: 20 }}>
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, marginBottom: 16 }}>
          {TIPOS_PERIODO_VENDAS.map(t => (
            <button key={t.key} className={'tab' + (tipo === t.key ? ' active' : '')} style={{ borderBottom: 'none', background: tipo === t.key ? 'var(--cor-vinho)' : 'transparent', color: tipo === t.key ? '#fff' : 'var(--cor-tinta-suave)', borderRadius: 20, padding: '7px 16px' }} onClick={() => setTipo(t.key)}>{t.label}</button>
          ))}
        </div>
        {tipo === 'semanal' && <div style={{ maxWidth: 200 }}><label>Qualquer dia dessa semana</label><input type="date" value={dataSemana} onChange={e => setDataSemana(e.target.value)} /></div>}
        {tipo === 'quinzenal' && (
          <div style={{ display: 'flex', gap: 10 }}>
            <div style={{ maxWidth: 160 }}><label>Mês</label><input type="month" value={mesQuinzena} onChange={e => setMesQuinzena(e.target.value)} /></div>
            <div style={{ maxWidth: 160 }}><label>Quinzena</label>
              <select value={quinzena} onChange={e => setQuinzena(Number(e.target.value))}>
                <option value={1}>1ª (dia 1-15)</option><option value={2}>2ª (dia 16-fim)</option>
              </select>
            </div>
          </div>
        )}
        {tipo === 'mensal' && <div style={{ maxWidth: 200 }}><label>Mês</label><input type="month" value={mesMensal} onChange={e => setMesMensal(e.target.value)} /></div>}
      </div>

      <p style={{ fontSize: 13, color: 'var(--cor-tinta-suave)', marginBottom: 12, textTransform: 'capitalize' }}>{labelPeriodo} · dados dos fechos de caixa</p>

      <div className="grid grid-3" style={{ marginBottom: 18 }}>
        <div className="card"><p className="stat-label">Total faturado (com IVA)</p><p className="stat-value">{totalPeriodo.toFixed(2)} €</p></div>
        <div className="card"><p className="stat-label">Valor sem IVA</p><p className="stat-value">{totalSemIVA.toFixed(2)} €</p></div>
        <div className="card"><p className="stat-label">IVA (23%)</p><p className="stat-value" style={{ color: 'var(--cor-dourado)' }}>{valorIVA.toFixed(2)} €</p></div>
      </div>

      <div className="grid grid-3" style={{ marginBottom: 22 }}>
        <div className="card"><p className="stat-label">Dias com fecho registado</p><p className="stat-value">{nDias}</p></div>
        <div className="card"><p className="stat-label">Média diária</p><p className="stat-value">{mediaDiaria.toFixed(2)} €</p></div>
        <div className="card"><p className="stat-label">Média diária sem IVA</p><p className="stat-value">{(nDias > 0 ? totalSemIVA / nDias : 0).toFixed(2)} €</p></div>
      </div>

      {buckets.length > 1 && (
        <div className="chart-card" style={{ marginBottom: 22 }}>
          <h3>Evolução no período</h3>
          <p className="chart-sub">{porDia ? 'Por dia' : 'Por mês'}</p>
          <ChartCanvas
            type="bar"
            data={{ labels: buckets.map(b => b.label), datasets: [{ data: totalPorBucket, backgroundColor: '#6B3446', borderRadius: 4 }] }}
            options={{ plugins: { legend: { display: false } }, scales: { x: { grid: { display: false } }, y: { beginAtZero: true, grid: { color: '#F0E7E0' } } } }}
            height={220}
          />
        </div>
      )}

      <div className="card">
        <h3 style={{ marginBottom: 12 }}>Por canal</h3>
        <table>
          <thead><tr><th>Canal</th><th>Valor</th></tr></thead>
          <tbody>
            <tr><td>Dinheiro</td><td>{totalDinheiro.toFixed(2)} €</td></tr>
            <tr><td>Cartão</td><td>{totalCartao.toFixed(2)} €</td></tr>
            <tr><td>Online</td><td>{totalOnline.toFixed(2)} €</td></tr>
          </tbody>
        </table>
        {nDias === 0 && <p className="empty-state">Sem fechos de caixa neste período.</p>}
      </div>
    </div>
  );
}

function VendasEstrategias() {
  const db = useDB();
  const vazio = { titulo: '', objetivo: '', data_inicio: hoje(), data_fim: '', status: 'planeada', valor_investido: '', resultado: '', valor_gerado: '' };
  const [form, setForm] = useState(vazio);
  const [editandoId, setEditandoId] = useState(null);

  function submeter(e) {
    if (e && e.preventDefault) e.preventDefault();
    if (!form.titulo) return;
    const dados = { ...form, valor_investido: Number(form.valor_investido) || 0, valor_gerado: Number(form.valor_gerado) || 0 };
    if (editandoId) { db.estrategiasOps.update(editandoId, dados); setEditandoId(null); }
    else db.estrategiasOps.add(dados);
    setForm(vazio);
  }

  function editar(e) {
    setEditandoId(e.id);
    setForm({ titulo: e.titulo, objetivo: e.objetivo || '', data_inicio: e.data_inicio || hoje(), data_fim: e.data_fim || '', status: e.status, valor_investido: String(e.valor_investido || ''), resultado: e.resultado || '', valor_gerado: String(e.valor_gerado || '') });
  }

  return (
    <div>
      <div className="card" style={{ marginBottom: 22 }}>
        <h3 style={{ marginBottom: 4 }}>{editandoId ? 'Editar estratégia' : 'Nova estratégia'}</h3>
        <p style={{ fontSize: 13, color: 'var(--cor-tinta-suave)', marginBottom: 16 }}>Promoções, pacotes, upsell, campanhas sazonais — o que queres tentar para vender mais.</p>
        <form onSubmit={submeter} style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(150px, 1fr))', gap: 10, alignItems: 'end' }}>
          <div style={{ minWidth: 180 }}><label>Título</label><input value={form.titulo} onChange={e => setForm({ ...form, titulo: e.target.value })} placeholder="Ex: Pacote noiva" /></div>
          <div style={{ minWidth: 180 }}><label>Objetivo</label><input value={form.objetivo} onChange={e => setForm({ ...form, objetivo: e.target.value })} placeholder="Ex: aumentar ticket médio" /></div>
          <div><label>Início</label><input type="date" value={form.data_inicio} onChange={e => setForm({ ...form, data_inicio: e.target.value })} /></div>
          <div><label>Fim</label><input type="date" value={form.data_fim} onChange={e => setForm({ ...form, data_fim: e.target.value })} /></div>
          <div><label>Valor investido (€)</label><input type="number" step="0.01" value={form.valor_investido} onChange={e => setForm({ ...form, valor_investido: e.target.value })} /></div>
          <div><label>Estado</label>
            <select value={form.status} onChange={e => setForm({ ...form, status: e.target.value })}>
              <option value="planeada">Planeada</option><option value="em_curso">Em curso</option><option value="concluida">Concluída</option>
            </select>
          </div>
          {form.status === 'concluida' && (
            <>
              <div style={{ minWidth: 180 }}><label>Resultado</label><input value={form.resultado} onChange={e => setForm({ ...form, resultado: e.target.value })} placeholder="Ex: resultou bem, repetir" /></div>
              <div><label>Valor gerado (€)</label><input type="number" step="0.01" value={form.valor_gerado} onChange={e => setForm({ ...form, valor_gerado: e.target.value })} /></div>
            </>
          )}
          <div style={{ display: 'flex', gap: 8 }}>
            <button className="btn" type="button" onClick={submeter} style={{ flex: 1, justifyContent: 'center' }}>{editandoId ? 'Guardar' : 'Adicionar'}</button>
            {editandoId && <button className="btn btn-secundario" type="button" onClick={() => { setEditandoId(null); setForm(vazio); }}>Cancelar</button>}
          </div>
        </form>
      </div>
      <div className="card">
        <table>
          <thead><tr><th>Estratégia</th><th>Objetivo</th><th>Período</th><th>Estado</th><th>Investido</th><th>Resultado</th><th>Gerado</th><th></th></tr></thead>
          <tbody>
            {db.estrategiasVendas.map(e => {
              const finalizada = e.status === 'concluida';
              return (
                <tr key={e.id}>
                  <td>{e.titulo}</td><td>{e.objetivo || '—'}</td>
                  <td>{e.data_inicio ? new Date(e.data_inicio).toLocaleDateString('pt-PT') : '—'} → {e.data_fim ? new Date(e.data_fim).toLocaleDateString('pt-PT') : '—'}</td>
                  <td>
                    <select value={e.status} onChange={ev => db.estrategiasOps.update(e.id, { status: ev.target.value })} className="select-compacto">
                      <option value="planeada">Planeada</option><option value="em_curso">Em curso</option><option value="concluida">Concluída</option>
                    </select>
                  </td>
                  <td>{finalizada ? (e.valor_investido ? Number(e.valor_investido).toFixed(2) + ' €' : '—') : '—'}</td>
                  <td>{finalizada ? (e.resultado || '—') : '—'}</td>
                  <td>{finalizada ? (e.valor_gerado ? Number(e.valor_gerado).toFixed(2) + ' €' : '—') : '—'}</td>
                  <td><button className="btn-icon" title="Editar" onClick={() => editar(e)}>✎</button></td>
                </tr>
              );
            })}
          </tbody>
        </table>
        {db.estrategiasVendas.length === 0 && <p className="empty-state">Sem estratégias registadas.</p>}
      </div>
    </div>
  );
}

function MktCanais() {
  const db = useDB();

  const conteudosPublicados = db.conteudos.filter(c => c.status === 'publicado').length;
  const anuncios = db.investimentosExternos.filter(i => i.tipo === 'Anúncio');
  const anunciosAtivos = anuncios.filter(a => a.status === 'ativo');
  const orcamentoAnuncios = anuncios.reduce((s, a) => s + Number(a.valor || 0), 0);
  const parcerias = db.investimentosExternos.filter(i => i.tipo === 'Parceria');
  const parceriasAtivas = parcerias.filter(p => p.status === 'ativo').length;
  const influencers = db.investimentosExternos.filter(i => i.tipo === 'Influencer');
  const influencersPago = influencers.reduce((s, i) => s + Number(i.valor || 0), 0);
  const offlineList = db.investimentosExternos.filter(i => i.tipo === 'Offline');
  const custoOffline = offlineList.reduce((s, o) => s + Number(o.valor || 0), 0);

  const investimentoTotal = orcamentoAnuncios + influencersPago + custoOffline;

  const totalClientesNovos = db.funisVendas.reduce((s, f) => s + Number(f.novos_clientes || 0), 0);
  const mesAtual = hoje().slice(0, 7);
  const totalFaturadoMes = db.fechosCaixa.filter(f => f.data.slice(0, 7) === mesAtual).reduce((s, f) => s + Number(f.dinheiro) + Number(f.cartao) + Number(f.online), 0);
  const ticketMedioEstimado = totalClientesNovos > 0 ? totalFaturadoMes / totalClientesNovos : 0;
  const custoPorCliente = totalClientesNovos > 0 ? investimentoTotal / totalClientesNovos : 0;

  const linhas = [
    { canal: 'Redes Sociais', indicador: `${conteudosPublicados} conteúdos publicados`, investimento: null },
    { canal: 'Anúncios Online', indicador: `${anunciosAtivos.length} campanha${anunciosAtivos.length === 1 ? '' : 's'} ativa${anunciosAtivos.length === 1 ? '' : 's'}`, investimento: orcamentoAnuncios },
    { canal: 'Parcerias', indicador: `${parceriasAtivas} ativa${parceriasAtivas === 1 ? '' : 's'}`, investimento: null },
    { canal: 'Influencers', indicador: `${influencers.length} colaboração${influencers.length === 1 ? '' : 'ões'}`, investimento: influencersPago },
    { canal: 'Offline', indicador: `${offlineList.length} ação${offlineList.length === 1 ? '' : 'ões'}`, investimento: custoOffline },
    { canal: 'Indicações', indicador: `Ver Vendas → Funis de vendas`, investimento: null },
  ];

  return (
    <div>
      <p style={{ fontSize: 13, color: 'var(--cor-tinta-suave)', marginBottom: 16 }}>Resumo automático de todos os canais — os dados vêm dos separadores ao lado, não precisas de repetir nada aqui.</p>

      <div className="grid grid-3" style={{ marginBottom: 20 }}>
        <div className="card">
          <p className="stat-label">Investimento total em marketing</p>
          <p className="stat-value">{investimentoTotal.toFixed(2)} €</p>
        </div>
        <div className="card">
          <p className="stat-label">Retorno — clientes novos (todos os funis)</p>
          <p className="stat-value">{totalClientesNovos}</p>
          {totalClientesNovos > 0 && <p style={{ fontSize: 12, color: 'var(--cor-tinta-suave)', marginTop: 4 }}>{custoPorCliente.toFixed(2)} € de investimento por cliente</p>}
        </div>
        <div className="card">
          <p className="stat-label">Ticket médio estimado</p>
          <p className="stat-value">{ticketMedioEstimado.toFixed(2)} €</p>
          <p style={{ fontSize: 12, color: 'var(--cor-tinta-suave)', marginTop: 4 }}>Faturação do mês ÷ clientes novos</p>
        </div>
      </div>

      <div className="card">
        <table>
          <thead><tr><th>Canal</th><th>Atividade</th><th>Investimento</th></tr></thead>
          <tbody>
            {linhas.map(l => (
              <tr key={l.canal}>
                <td>{l.canal}</td>
                <td>{l.indicador}</td>
                <td>{l.investimento === null ? '—' : `${l.investimento.toFixed(2)} €`}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

const STATUS_EVENTO = [
  { key: 'planeado', label: 'Planeado', cor: '#8A6A28', fundo: '#F3E4C9' },
  { key: 'em_curso', label: 'Em curso', cor: 'var(--cor-vinho)', fundo: '#F3E9E2' },
  { key: 'feito', label: 'Feito', cor: 'var(--cor-sucesso)', fundo: '#E5EBDF' },
  { key: 'sem_campanha', label: 'Sem campanha', cor: 'var(--cor-tinta-suave)', fundo: '#F1ECE8' },
];

function diasAteEvento(dataISO) {
  const hojeD = new Date(); hojeD.setHours(0, 0, 0, 0);
  const d = new Date(dataISO + 'T00:00:00');
  return Math.round((d - hojeD) / (24 * 3600 * 1000));
}

function MktCalendario() {
  const db = useDB();
  const anoAtual = new Date().getFullYear();
  const vazio = { nome: '', data: `${anoAtual}-01-01`, campanha: '', status: 'planeado' };
  const [form, setForm] = useState(vazio);
  const [editandoId, setEditandoId] = useState(null);

  function submeter(e) {
    if (e && e.preventDefault) e.preventDefault();
    if (!form.nome || !form.data) return;
    if (editandoId) { db.eventosOps.update(editandoId, form); setEditandoId(null); }
    else db.eventosOps.add(form);
    setForm(vazio);
  }

  function editar(ev) {
    setEditandoId(ev.id);
    setForm({ nome: ev.nome, data: ev.data, campanha: ev.campanha, status: ev.status });
  }

  const eventosOrdenados = [...db.eventosCalendario].sort((a, b) => a.data.localeCompare(b.data));
  const proximos = eventosOrdenados.filter(ev => diasAteEvento(ev.data) >= -1);
  const passados = eventosOrdenados.filter(ev => diasAteEvento(ev.data) < -1);

  return (
    <div>
      <p style={{ fontSize: 13, color: 'var(--cor-tinta-suave)', marginBottom: 16 }}>Datas do ano que valem a pena aproveitar em marketing, e que campanha vais fazer para cada uma.</p>

      <div className="card" style={{ marginBottom: 22 }}>
        <h3 style={{ marginBottom: 14 }}>{editandoId ? 'Editar data' : 'Nova data'}</h3>
        <form onSubmit={submeter} style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(150px, 1fr))', gap: 10, alignItems: 'end' }}>
          <div style={{ minWidth: 160 }}><label>Data comemorativa</label><input value={form.nome} onChange={e => setForm({ ...form, nome: e.target.value })} placeholder="Ex: Dia dos Namorados" /></div>
          <div><label>Quando</label><input type="date" value={form.data} onChange={e => setForm({ ...form, data: e.target.value })} /></div>
          <div style={{ minWidth: 180 }}><label>Campanha</label><input value={form.campanha} onChange={e => setForm({ ...form, campanha: e.target.value })} placeholder="Ex: Promoção casal, 20% desconto" /></div>
          <div><label>Estado</label>
            <select value={form.status} onChange={e => setForm({ ...form, status: e.target.value })}>
              {STATUS_EVENTO.map(s => <option key={s.key} value={s.key}>{s.label}</option>)}
            </select>
          </div>
          <div style={{ display: 'flex', gap: 8 }}>
            <button className="btn" type="button" onClick={submeter} style={{ flex: 1, justifyContent: 'center' }}>{editandoId ? 'Guardar' : 'Adicionar'}</button>
            {editandoId && <button className="btn btn-secundario" type="button" onClick={() => { setEditandoId(null); setForm(vazio); }}>Cancelar</button>}
          </div>
        </form>
      </div>

      <h3 style={{ marginBottom: 12 }}>Próximas datas</h3>
      <div className="card" style={{ marginBottom: 22 }}>
        <table>
          <thead><tr><th>Data</th><th>Faltam</th><th>Evento</th><th>Campanha</th><th>Estado</th><th></th></tr></thead>
          <tbody>
            {proximos.map(ev => {
              const dias = diasAteEvento(ev.data);
              const st = STATUS_EVENTO.find(s => s.key === ev.status) || STATUS_EVENTO[0];
              return (
                <tr key={ev.id}>
                  <td>{new Date(ev.data + 'T00:00:00').toLocaleDateString('pt-PT')}</td>
                  <td style={{ fontWeight: 700, color: dias <= 7 ? 'var(--cor-alerta)' : 'inherit' }}>{dias === 0 ? 'Hoje' : dias === 1 ? 'Amanhã' : `${dias} dias`}</td>
                  <td>{ev.nome}</td>
                  <td>{ev.campanha || '—'}</td>
                  <td><span className="badge" style={{ background: st.fundo, color: st.cor }}>{st.label}</span></td>
                  <td>
                    <button className="btn btn-secundario" style={{ padding: '5px 10px', marginRight: 6 }} onClick={() => editar(ev)}>Editar</button>
                    <button className="btn btn-secundario" style={{ padding: '5px 10px' }} onClick={() => db.eventosOps.remove(ev.id)}>Remover</button>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
        {proximos.length === 0 && <p className="empty-state">Sem datas futuras registadas.</p>}
      </div>

      {passados.length > 0 && (
        <div className="card">
          <h3 style={{ marginBottom: 12 }}>Já passaram</h3>
          <table>
            <thead><tr><th>Data</th><th>Evento</th><th>Campanha</th><th>Estado</th></tr></thead>
            <tbody>
              {passados.map(ev => (
                <tr key={ev.id}><td>{new Date(ev.data + 'T00:00:00').toLocaleDateString('pt-PT')}</td><td>{ev.nome}</td><td>{ev.campanha || '—'}</td><td>{STATUS_EVENTO.find(s => s.key === ev.status)?.label}</td></tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

              <option>Instagram</option><option>Facebook</option><option>TikTok</option><option>Google Ads</option>
            </select>
          </div>
          <div><label>Data</label><input type="date" value={form.data_publicacao} onChange={e => setForm({ ...form, data_publicacao: e.target.value })} /></div>
          <button className="btn" type="button" onClick={criar}>Adicionar</button>
        </form>
      </div>
      <div className="card">
        <table>
          <thead><tr><th>Data</th><th>Título</th><th>Tipo</th><th>Plataforma</th><th>Responsável</th><th>Estado</th></tr></thead>
          <tbody>
            {db.conteudos.map(c => (
              <tr key={c.id}>
                <td>{c.data_publicacao ? new Date(c.data_publicacao).toLocaleDateString('pt-PT') : '—'}</td>
                <td>{c.titulo}</td><td>{c.tipo}</td><td>{c.plataforma}</td><td>{db.nomeColaborador(c.responsavel)}</td>
                <td>

                    <option value="planeado">Planeado</option><option value="produzido">Produzido</option><option value="publicado">Publicado</option>
                  </select>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
        {db.conteudos.length === 0 && <p className="empty-state">Sem conteúdos no calendário ainda.</p>}
      </div>
    </div>
  );
}

const DETALHE_OPCOES = {
  'Anúncio': ['Meta', 'Google', 'TikTok', 'Outro'],
  'Parceria': ['Permuta', 'Patrocínio', 'Comissão', 'Outro'],
  'Influencer': ['Instagram', 'TikTok', 'YouTube', 'Outro'],
  'Offline': ['Flyers', 'Evento', 'Feira', 'Outdoor', 'Outro'],
};

function MktInvestimentosExternos() {
  const db = useDB();
  const vazio = { tipo: 'Anúncio', nome: '', detalhe: DETALHE_OPCOES['Anúncio'][0], valor: '', retorno_clientes: '', data: hoje(), status: 'ativo' };
  const [form, setForm] = useState(vazio);
  const [filtro, setFiltro] = useState('todos');
  const [editandoId, setEditandoId] = useState(null);

  const detalheLabel = {
    'Anúncio': 'Plataforma',
    'Parceria': 'Tipo de parceria',
    'Influencer': 'Rede',
    'Offline': 'Tipo',
  };

  function mudarTipo(novoTipo) {
    setForm({ ...form, tipo: novoTipo, detalhe: DETALHE_OPCOES[novoTipo][0] });
  }

  function submeter(e) {
    if (e && e.preventDefault) e.preventDefault();
    if (!form.nome) return;
    const dados = { ...form, valor: Number(form.valor) || 0, retorno_clientes: Number(form.retorno_clientes) || 0 };
    if (editandoId) { db.investimentosOps.update(editandoId, dados); setEditandoId(null); }
    else db.investimentosOps.add(dados);
    setForm(vazio);
  }

  function editar(i) {
    setEditandoId(i.id);
    setForm({ tipo: i.tipo, nome: i.nome, detalhe: i.detalhe || DETALHE_OPCOES[i.tipo][0], valor: String(i.valor), retorno_clientes: String(i.retorno_clientes || 0), data: i.data || hoje(), status: i.status });
  }

  const lista = db.investimentosExternos.filter(i => filtro === 'todos' || i.tipo === filtro).sort((a, b) => (b.data || '').localeCompare(a.data || ''));
  const totalFiltrado = lista.reduce((s, i) => s + Number(i.valor || 0), 0);

  const porDetalhe = {};
  lista.forEach(i => {
    const chave = `${i.tipo} · ${i.detalhe || '—'}`;
    if (!porDetalhe[chave]) porDetalhe[chave] = { chave, gasto: 0, clientes: 0 };
    porDetalhe[chave].gasto += Number(i.valor || 0);
    porDetalhe[chave].clientes += Number(i.retorno_clientes || 0);
  });
  const resumoDetalhe = Object.values(porDetalhe).sort((a, b) => b.gasto - a.gasto);

  return (
    <div>
      <p style={{ fontSize: 13, color: 'var(--cor-tinta-suave)', marginBottom: 16 }}>Anúncios, parcerias, influencers e ações offline — tudo junto, filtrável por tipo.</p>

      <div className="card" style={{ marginBottom: 22 }}>
        <h3 style={{ marginBottom: 14 }}>{editandoId ? 'Editar' : 'Novo investimento'}</h3>
        <form onSubmit={submeter} style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(140px, 1fr))', gap: 10, alignItems: 'end' }}>
          <div><label>Tipo</label>
            <select value={form.tipo} onChange={e => mudarTipo(e.target.value)}>
              <option>Anúncio</option><option>Parceria</option><option>Influencer</option><option>Offline</option>
            </select>
          </div>
          <div style={{ minWidth: 150 }}><label>Nome</label><input value={form.nome} onChange={e => setForm({ ...form, nome: e.target.value })} placeholder="Ex: Campanha Verão" /></div>
          <div><label>{detalheLabel[form.tipo]}</label>
            <select value={form.detalhe} onChange={e => setForm({ ...form, detalhe: e.target.value })}>
              {DETALHE_OPCOES[form.tipo].map(op => <option key={op} value={op}>{op}</option>)}
            </select>
          </div>
          <div><label>Valor gasto (€)</label><input type="number" step="0.01" value={form.valor} onChange={e => setForm({ ...form, valor: e.target.value })} /></div>
          <div><label>Retorno (clientes)</label><input type="number" step="1" min="0" value={form.retorno_clientes} onChange={e => setForm({ ...form, retorno_clientes: e.target.value })} /></div>
          <div><label>Data</label><input type="date" value={form.data} onChange={e => setForm({ ...form, data: e.target.value })} /></div>
          <div><label>Estado</label>
            <select value={form.status} onChange={e => setForm({ ...form, status: e.target.value })}>
              <option value="ativo">Ativo</option><option value="pausado">Pausado</option><option value="concluido">Concluído</option>
            </select>
          </div>
          <div style={{ display: 'flex', gap: 8 }}>
            <button className="btn" type="button" onClick={submeter} style={{ flex: 1, justifyContent: 'center' }}>{editandoId ? 'Guardar' : 'Adicionar'}</button>
            {editandoId && <button className="btn btn-secundario" type="button" onClick={() => { setEditandoId(null); setForm(vazio); }}>Cancelar</button>}
          </div>
        </form>
      </div>

      <div style={{ display: 'flex', gap: 8, marginBottom: 16, flexWrap: 'wrap', alignItems: 'center' }}>
        {['todos', 'Anúncio', 'Parceria', 'Influencer', 'Offline'].map(t => (
          <button key={t} className={'tab' + (filtro === t ? ' active' : '')} style={{ borderBottom: 'none', background: filtro === t ? 'var(--cor-vinho)' : 'transparent', color: filtro === t ? '#fff' : 'var(--cor-tinta-suave)', borderRadius: 20, padding: '6px 14px' }} onClick={() => setFiltro(t)}>{t === 'todos' ? 'Todos' : t}</button>
        ))}
        <span style={{ marginLeft: 'auto', fontSize: 13, fontWeight: 600, color: 'var(--cor-vinho-escuro)' }}>Total: {totalFiltrado.toFixed(2)} €</span>
      </div>

      {resumoDetalhe.length > 0 && (
        <div className="card" style={{ marginBottom: 20 }}>
          <h3 style={{ marginBottom: 12 }}>Gasto e retorno por opção</h3>
          <table>
            <thead><tr><th>Opção</th><th>Gasto</th><th>Clientes gerados</th><th>Custo por cliente</th></tr></thead>
            <tbody>
              {resumoDetalhe.map(r => (
                <tr key={r.chave}>
                  <td>{r.chave}</td><td>{r.gasto.toFixed(2)} €</td><td>{r.clientes}</td>
                  <td>{r.clientes > 0 ? (r.gasto / r.clientes).toFixed(2) + ' €' : '—'}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      <div className="card">
        <table>
          <thead><tr><th>Tipo</th><th>Nome</th><th>Detalhe</th><th>Valor</th><th>Retorno</th><th>Data</th><th>Estado</th><th></th></tr></thead>
          <tbody>
            {lista.map(i => (
              <tr key={i.id}>
                <td>{i.tipo}</td><td>{i.nome}</td><td>{i.detalhe || '—'}</td><td>{Number(i.valor).toFixed(2)} €</td>
                <td>{i.retorno_clientes || 0} clientes</td>
                <td>{i.data ? new Date(i.data).toLocaleDateString('pt-PT') : '—'}</td>
                <td>
                  <select value={i.status} onChange={e => db.investimentosOps.update(i.id, { status: e.target.value })} className="select-compacto">
                    <option value="ativo">Ativo</option><option value="pausado">Pausado</option><option value="concluido">Concluído</option>
                  </select>
                </td>
                <td>
                  <div className="acoes-linha">
                    <button className="btn-icon" title="Editar" onClick={() => editar(i)}>✎</button>
                    <button className="btn-icon perigo" title="Remover" onClick={() => db.investimentosOps.remove(i.id)}>🗑</button>
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
        {lista.length === 0 && <p className="empty-state">Sem investimentos registados.</p>}
      </div>
    </div>
  );
}

/* ============================ GESTÃO ============================ */
const COLUNAS = [{ key: 'a_fazer', label: 'A fazer' }, { key: 'em_progresso', label: 'Em progresso' }, { key: 'concluido', label: 'Concluído' }];

const URGENCIAS = [
  { key: 'baixa', label: 'Baixa', cor: 'var(--cor-sucesso)', fundo: '#E5EBDF' },
  { key: 'media', label: 'Média', cor: '#8A6A28', fundo: '#F3E4C9' },
  { key: 'alta', label: 'Alta', cor: 'var(--cor-alerta)', fundo: '#F6E2D8' },
];

const CATEGORIAS_GESTAO = [
  { key: 'estrategia', label: 'Estratégia', cor: 'var(--cor-vinho)', fundo: '#F3E9E2' },
  { key: 'financeiro', label: 'Financeiro', cor: 'var(--cor-dourado)', fundo: '#F3E7D2' },
  { key: 'pessoas', label: 'Pessoas', cor: 'var(--cor-sucesso)', fundo: '#E5EBDF' },
  { key: 'operacoes', label: 'Operações', cor: '#5C7A99', fundo: '#E2EAF1' },
  { key: 'externo', label: 'Externo', cor: 'var(--cor-alerta)', fundo: '#F6E2D8' },
];

const FREQUENCIAS = [
  { key: 'semanal', label: 'Semanal' },
  { key: 'quinzenal', label: 'Quinzenal' },
  { key: 'mensal', label: 'Mensal' },
  { key: 'trimestral', label: 'Trimestral' },
  { key: 'semestral', label: 'Semestral' },
  { key: 'anual', label: 'Anual' },
];

function proximaOcorrencia(modelo) {
  const d = new Date(modelo.data_referencia + 'T00:00:00');
  const hojeD = new Date(); hojeD.setHours(0, 0, 0, 0);
  function avancar() {
    switch (modelo.frequencia) {
      case 'semanal': d.setDate(d.getDate() + 7); break;
      case 'quinzenal': d.setDate(d.getDate() + 14); break;
      case 'mensal': d.setMonth(d.getMonth() + 1); break;
      case 'trimestral': d.setMonth(d.getMonth() + 3); break;
      case 'semestral': d.setMonth(d.getMonth() + 6); break;
      case 'anual': d.setFullYear(d.getFullYear() + 1); break;
      default: d.setDate(d.getDate() + 7);
    }
  }
  let guarda = 0;
  while (d < hojeD && guarda < 2000) { avancar(); guarda++; }
  return d.toISOString().slice(0, 10);
}

function ModelosSemanais() {
  const db = useDB();
  const vazio = { titulo: '', frequencia: 'semanal', data_referencia: hoje(), categoria: 'estrategia', urgencia: 'media' };
  const [form, setForm] = useState(vazio);
  const [editandoId, setEditandoId] = useState(null);

  function submeter(e) {
    e.preventDefault();
    if (!form.titulo) return;
    if (editandoId) {
      db.atualizarModeloSemanal(editandoId, form);
      setEditandoId(null);
    } else {
      db.adicionarModeloSemanal(form);
    }
    setForm(vazio);
  }

  function editar(m) {
    setEditandoId(m.id);
    setForm({ titulo: m.titulo, frequencia: m.frequencia, data_referencia: m.data_referencia, categoria: m.categoria, urgencia: m.urgencia });
  }

  function cancelarEdicao() {
    setEditandoId(null);
    setForm(vazio);
  }

  return (
    <div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 8, marginTop: 14, marginBottom: 16 }}>
        {db.modelosSemanais.map(m => {
          const cat = CATEGORIAS_GESTAO.find(c => c.key === m.categoria);
          const freq = FREQUENCIAS.find(f => f.key === m.frequencia);
          const proxima = proximaOcorrencia(m);
          return (
            <div key={m.id} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '8px 12px', border: '1px solid var(--cor-linha)', borderRadius: 8, background: '#fff', flexWrap: 'wrap' }}>
              <span className="badge badge-pendente" style={{ flexShrink: 0 }}>{freq?.label}</span>
              <span style={{ flex: 1, minWidth: 160, fontSize: 14 }}>{m.titulo}</span>
              {cat && <span className="badge" style={{ background: cat.fundo, color: cat.cor, flexShrink: 0 }}>{cat.label}</span>}
              <span style={{ fontSize: 11.5, color: 'var(--cor-tinta-suave)', flexShrink: 0 }}>próxima: {new Date(proxima + 'T00:00:00').toLocaleDateString('pt-PT')}</span>
              <button className="btn btn-secundario" style={{ padding: '5px 12px' }} onClick={() => editar(m)}>Editar</button>
              <button className="btn btn-secundario" style={{ padding: '5px 12px' }} onClick={() => db.removerModeloSemanal(m.id)}>Remover</button>
            </div>
          );
        })}
        {db.modelosSemanais.length === 0 && <p className="empty-state">Sem tarefas recorrentes definidas.</p>}
      </div>

      <form onSubmit={submeter} style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(150px, 1fr))', gap: 10, alignItems: 'end', borderTop: '1px solid var(--cor-linha)', paddingTop: 14 }}>
        <div style={{ minWidth: 180 }}><label>Título</label><input value={form.titulo} onChange={e => setForm({ ...form, titulo: e.target.value })} /></div>
        <div><label>Frequência</label>
          <select value={form.frequencia} onChange={e => setForm({ ...form, frequencia: e.target.value })}>
            {FREQUENCIAS.map(f => <option key={f.key} value={f.key}>{f.label}</option>)}
          </select>
        </div>
        <div><label>Data de referência</label><input type="date" value={form.data_referencia} onChange={e => setForm({ ...form, data_referencia: e.target.value })} /></div>
        <div><label>Categoria</label>
          <select value={form.categoria} onChange={e => setForm({ ...form, categoria: e.target.value })}>
            {CATEGORIAS_GESTAO.map(c => <option key={c.key} value={c.key}>{c.label}</option>)}
          </select>
        </div>
        <div><label>Urgência</label>
          <select value={form.urgencia} onChange={e => setForm({ ...form, urgencia: e.target.value })}>
            {URGENCIAS_PEDIDO.map(u => <option key={u.key} value={u.key}>{u.label}</option>)}
          </select>
        </div>
        <div style={{ display: 'flex', gap: 8 }}>
          <button className="btn" type="button" onClick={submeter} style={{ flex: 1, justifyContent: 'center' }}>{editandoId ? 'Guardar' : 'Adicionar'}</button>
          {editandoId && <button className="btn btn-secundario" type="button" onClick={cancelarEdicao}>Cancelar</button>}
        </div>
      </form>
    </div>
  );
}

function Gestao() {
  const db = useDB();
  const [tab, setTab] = useState('quadro');
  const [mostrarForm, setMostrarForm] = useState(false);
  const [form, setForm] = useState({ titulo: '', data_inicio: hoje(), data_entrega: '', urgencia: 'media', categoria: 'estrategia' });
  const tarefasGestora = db.tarefas.filter(t => t.responsavel_nome === GESTORA_NOME);

  function criarTarefaAvulsa(e) {
    e.preventDefault();
    if (!form.titulo) return;
    db.criarTarefa({ ...form, responsavel_nome: GESTORA_NOME });
    setForm({ titulo: '', data_inicio: hoje(), data_entrega: '', urgencia: 'media', categoria: 'estrategia' });
    setMostrarForm(false);
  }

  function gerarTarefasRecorrentes() {
    db.modelosSemanais.forEach(modelo => {
      const dataAlvo = proximaOcorrencia(modelo);
      const jaExiste = tarefasGestora.some(t => t.titulo === modelo.titulo && t.data_entrega === dataAlvo);
      if (!jaExiste) {
        db.criarTarefa({
          titulo: modelo.titulo, categoria: modelo.categoria, urgencia: modelo.urgencia,
          data_inicio: dataAlvo, data_entrega: dataAlvo, responsavel_nome: GESTORA_NOME,
        });
      }
    });
  }

  useEffect(() => {
    gerarTarefasRecorrentes();
    // eslint-disable-next-line
  }, [db.modelosSemanais.length]);

  const abertas = tarefasGestora.filter(t => t.status !== 'concluido');
  const atrasadas = abertas.filter(t => t.data_entrega && t.data_entrega < hoje());
  const concluidasSemana = tarefasGestora.filter(t => {
    if (t.status !== 'concluido') return false;
    const seteDiasAtras = new Date(); seteDiasAtras.setDate(seteDiasAtras.getDate() - 7);
    return new Date(t.criado_em) >= seteDiasAtras;
  });

  return (
    <div>
      <div className="topbar"><div><p className="eyebrow">Gestão</p><h1>Tarefas de {GESTORA_NOME}</h1></div></div>

      <div className="kpi-grid" style={{ gridTemplateColumns: 'repeat(3, 1fr)' }}>
        <div className="kpi-card">
          <div className="kpi-top"><div className="kpi-icon">✓</div></div>
          <p className="kpi-value">{abertas.length}</p>
          <p className="kpi-label">Tarefas em aberto</p>
        </div>
        <div className="kpi-card acento-alerta">
          <div className="kpi-top"><div className="kpi-icon" style={{ background: '#F6E2D8', color: 'var(--cor-alerta)' }}>!</div></div>
          <p className="kpi-value" style={{ color: atrasadas.length > 0 ? 'var(--cor-alerta)' : 'var(--cor-vinho-escuro)' }}>{atrasadas.length}</p>
          <p className="kpi-label">Atrasadas</p>
        </div>
        <div className="kpi-card acento-sucesso">
          <div className="kpi-top"><div className="kpi-icon" style={{ background: '#E5EBDF', color: 'var(--cor-sucesso)' }}>★</div></div>
          <p className="kpi-value">{concluidasSemana.length}</p>
          <p className="kpi-label">Concluídas esta semana</p>
        </div>
      </div>

      <div className="tabs" style={{ justifyContent: 'space-between', display: 'flex' }}>
        <div style={{ display: 'flex' }}>
          <button className={'tab' + (tab === 'quadro' ? ' active' : '')} onClick={() => setTab('quadro')}>Quadro</button>
          <button className={'tab' + (tab === 'recorrentes' ? ' active' : '')} onClick={() => setTab('recorrentes')}>Tarefas recorrentes</button>
        </div>
        {tab === 'quadro' && <button className="btn" style={{ marginBottom: 10 }} onClick={() => setMostrarForm(s => !s)}>{mostrarForm ? 'Cancelar' : '+ Nova tarefa'}</button>}
      </div>

      {tab === 'quadro' && mostrarForm && (
        <div className="card" style={{ marginBottom: 20 }}>
          <form onSubmit={criarTarefaAvulsa} style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(150px, 1fr))', gap: 10, alignItems: 'end' }}>
            <div style={{ minWidth: 180 }}><label>Título</label><input value={form.titulo} onChange={e => setForm({ ...form, titulo: e.target.value })} autoFocus /></div>
            <div><label>Início</label><input type="date" value={form.data_inicio} onChange={e => setForm({ ...form, data_inicio: e.target.value })} /></div>
            <div><label>Entrega</label><input type="date" value={form.data_entrega} onChange={e => setForm({ ...form, data_entrega: e.target.value })} /></div>
            <div><label>Urgência</label>
              <select value={form.urgencia} onChange={e => setForm({ ...form, urgencia: e.target.value })}>
                {URGENCIAS_PEDIDO.map(u => <option key={u.key} value={u.key}>{u.label}</option>)}
              </select>
            </div>
            <div><label>Categoria</label>
              <select value={form.categoria} onChange={e => setForm({ ...form, categoria: e.target.value })}>
                {CATEGORIAS_GESTAO.map(c => <option key={c.key} value={c.key}>{c.label}</option>)}
              </select>
            </div>
            <div><button className="btn" type="button" onClick={criarTarefaAvulsa} style={{ width: '100%', justifyContent: 'center' }}>Adicionar</button></div>
          </form>
        </div>
      )}

      {tab === 'recorrentes' ? (
        <div className="card">
          <p style={{ fontSize: 13, color: 'var(--cor-tinta-suave)', marginBottom: 4 }}>Semanais, quinzenais, mensais, trimestrais, semestrais ou anuais. As tarefas pendentes são geradas automaticamente ao abrir esta página.</p>
          <ModelosSemanais />
        </div>
      ) : (
        <div className="grid grid-3">
          {COLUNAS.map(col => (
            <div key={col.key} className="card">
              <h3 style={{ marginBottom: 12 }}>{col.label}</h3>
              {tarefasGestora.filter(t => t.status === col.key).map(t => {
                const urg = URGENCIAS.find(u => u.key === t.urgencia) || URGENCIAS[1];
                const cat = CATEGORIAS_GESTAO.find(c => c.key === t.categoria);
                const atrasada = t.data_entrega && t.data_entrega < hoje() && t.status !== 'concluido';
                return (
                  <div key={t.id} style={{ padding: '10px 0', borderBottom: '1px solid var(--cor-linha)' }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 6 }}>
                      <p style={{ fontSize: 14, fontWeight: 500 }}>{t.titulo}</p>
                      <span className="badge" style={{ background: urg.fundo, color: urg.cor, flexShrink: 0 }}>{urg.label}</span>
                    </div>
                    {cat && <span className="badge" style={{ background: cat.fundo, color: cat.cor, marginTop: 4, display: 'inline-block' }}>{cat.label}</span>}
                    {(t.data_inicio || t.data_entrega) && (
                      <p style={{ fontSize: 11.5, color: atrasada ? 'var(--cor-alerta)' : 'var(--cor-tinta-suave)', margin: '6px 0 6px', fontWeight: atrasada ? 700 : 400 }}>
                        {t.data_inicio ? new Date(t.data_inicio + 'T00:00:00').toLocaleDateString('pt-PT') : '—'}
                        {' → '}
                        {t.data_entrega ? new Date(t.data_entrega + 'T00:00:00').toLocaleDateString('pt-PT') : '—'}
                        {atrasada ? ' · atrasada' : ''}
                      </p>
                    )}
                    <select value={t.status} onChange={e => db.atualizarStatusTarefa(t.id, e.target.value)} style={{ fontSize: 12, padding: '4px 8px' }}>
                      {COLUNAS.map(c => <option key={c.key} value={c.key}>{c.label}</option>)}
                    </select>
                  </div>
                );
              })}
              {tarefasGestora.filter(t => t.status === col.key).length === 0 && <p className="empty-state">Sem tarefas.</p>}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ============================ APP ============================ */
function AppInner() {
  const { profile } = useAuth();
  const [area, setArea] = useState(profile?.is_admin ? 'Dashboard' : (profile?.areas?.[0] || 'Dashboard'));

  useEffect(() => {
    const permitidas = profile.is_admin ? AREAS.map(a => a.key) : (profile.areas || []);
    if (area === 'Dashboard') {
      if (!profile.is_admin) setArea(permitidas[0] || 'Financeiro');
      return;
    }
    if (!permitidas.includes(area)) setArea(profile.is_admin ? 'Dashboard' : (permitidas[0] || 'Financeiro'));
  }, [profile]);

  return (
    <Layout area={area} setArea={setArea}>
      {area === 'Dashboard' && <Dashboard />}
      {area === 'Agenda' && <Agenda />}
      {area === 'Gestao' && <Gestao />}
      {area === 'Financeiro' && <Financeiro />}
      {area === 'Marketing' && <Marketing />}
      {area === 'Vendas' && <Vendas />}
      {area === 'ListaCompras' && <ListaComprasColaboradoras />}
      {area === 'Estoque' && <Estoque />}
    </Layout>
  );
}

function App() {
  const db = useMockDB();
  if (!db.carregadoDoSupabase) {
    return (
      <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', flexDirection: 'column', gap: 12, background: 'var(--cor-fundo)' }}>
        <div className="eyebrow">Atelier Rafa Mendonça</div>
        <p style={{ color: 'var(--cor-tinta-suave)', fontSize: 14 }}>A ligar ao Supabase…</p>
      </div>
    );
  }
  return (
    <DBContext.Provider value={db}>
      <AuthProvider><AppInner /></AuthProvider>
    </DBContext.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
